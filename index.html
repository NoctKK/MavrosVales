<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        :root { --gold: #d4af37; --felt: radial-gradient(circle at center, #2e5c3e 0%, #13351f 100%); --panel-bg: rgba(0, 0, 0, 0.85); }
        body { background: var(--felt); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        #game-wrapper { width: 1280px; height: 720px; position: relative; display: grid; grid-template-areas: ". top ." "left center right" ". bottom ."; grid-template-columns: 250px 1fr 250px; grid-template-rows: 150px 1fr 220px; transform-origin: center center; }

        /* UI FIX: Ταμπέλες να μην κρύβουν τα βέλη */
        #turn-indicator { position: absolute; top: 70px; right: 20px; padding: 10px; background: rgba(0,0,0,0.7); border: 2px solid #4f4; border-radius: 10px; z-index: 500; font-weight: bold; }
        #direction-indicator { position: absolute; top: 15px; right: 20px; padding: 10px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); border-radius: 10px; z-index: 500; font-size: 18px; color: var(--gold); }

        #msg-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9000; pointer-events: none; width: 100%; justify-content: center; }
        
        /* Game Over Screen */
        #final-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .win-msg { font-size: 40px; color: var(--gold); margin-bottom: 30px; }
        
        .player-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { width: 110px; height: 160px; background: white; color: black; border-radius: 10px; position: relative; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s; flex-shrink: 0; }
        .card.red { color: #d00; }
        .card-corner { position: absolute; top: 5px; left: 5px; font-size: 24px; font-weight: bold; }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; }
        
        #my-hand-container { width: 95%; display: flex; justify-content: center; height: 180px; margin: 0 auto; }
        .hand-card { margin-left: -55px; }
        .hand-card:hover { transform: translateY(-30px); z-index: 100; }

        #scoreboard { position: absolute; top: 20px; left: 20px; background: var(--panel-bg); border: 1px solid var(--gold); padding: 10px; z-index: 1000; border-radius: 10px; max-height: 200px; overflow-y: auto; }
        .suit-btn { width: 80px; height: 80px; font-size: 40px; margin: 10px; cursor: pointer; }
        #ace-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9500; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="final-screen">
        <div class="win-msg" id="win-text"></div>
        <button class="game-btn" onclick="location.reload()" style="margin:10px; padding:15px; background:var(--gold); border:none; cursor:pointer;">Άντε πάμε άλλο ένα</button>
        <button class="game-btn" onclick="location.reload()" style="margin:10px; padding:15px; background:var(--gold); border:none; cursor:pointer;">Ένα τελευταίο 😂</button>
        <button class="game-btn" onclick="location.reload()" style="margin:10px; padding:15px; background:var(--gold); border:none; cursor:pointer;">Θα πάρω το αίμα μου πίσω, πάμε 💪🏻</button>
    </div>

    <div id="start-screen" style="position:fixed; inset:0; background:black; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--gold)">Μαύρος Βαλές ♠️</h1>
        <input type="text" id="username" placeholder="Όνομα..." style="padding:10px; font-size:20px;">
        <button onclick="joinGame()" style="padding:10px 30px; margin-top:20px; font-size:20px; cursor:pointer;">ΕΙΣΟΔΟΣ</button>
        <p id="waiting-msg" style="display:none">Περιμένοντας παίκτες...</p>
        <button id="start-btn" onclick="socket.emit('startGameRequest')" style="display:none; padding:10px 30px; margin-top:20px; cursor:pointer;">ΕΚΚΙΝΗΣΗ</button>
    </div>

    <div id="game-wrapper">
        <div id="scoreboard" onclick="this.style.maxHeight='500px'"><table id="score-table"></table></div>
        <div id="direction-indicator"></div>
        <div id="turn-indicator"></div>
        
        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>
        <div id="slot-right" class="player-slot"></div>

        <div id="game-center" style="grid-area:center; display:flex; align-items:center; justify-content:center; gap:30px;">
            <div id="draw-pile" onclick="socket.emit('drawCard')" style="width:100px; height:145px; background:maroon; border:2px solid white; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer;">🂠</div>
            <div id="pile-container" style="width:110px; height:160px; position:relative;"></div>
            <button onclick="socket.emit('passTurn')" style="padding:10px 20px; cursor:pointer;">ΠΑΣΟ</button>
        </div>

        <div id="slot-bottom" class="player-slot">
            <div id="my-hand-container"></div>
        </div>
        
        <div id="msg-overlay"></div>
    </div>

    <div id="ace-modal">
        <h2 style="color:var(--gold)">Διάλεξε Σχήμα</h2>
        <div>
            <button class="suit-btn" onclick="confirmAce('♠')">♠</button>
            <button class="suit-btn" onclick="confirmAce('♣')">♣</button>
            <button class="suit-btn" style="color:red" onclick="confirmAce('♥')">♥</button>
            <button class="suit-btn" style="color:red" onclick="confirmAce('♦')">♦</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId, selectedAceIndex = null, lastTopCard = null;
        let lastClickTime = 0;

        function joinGame() {
            const name = document.getElementById('username').value;
            if(!name) return;
            let sid = sessionStorage.getItem('mv_session') || 'sess_'+Math.random();
            sessionStorage.setItem('mv_session', sid);
            socket.emit('joinGame', { username: name, sessionId: sid });
            document.getElementById('username').style.display = 'none';
            document.getElementById('waiting-msg').style.display = 'block';
        }

        socket.on('playerCountUpdate', c => {
            document.getElementById('waiting-msg').innerText = `Παίκτες: ${c}`;
            document.getElementById('start-btn').style.display = c >= 2 ? 'block' : 'none';
        });

        socket.on('gameReady', () => { document.getElementById('start-screen').style.display = 'none'; });

        socket.on('updateUI', data => {
            const ind = document.getElementById('turn-indicator');
            ind.innerText = data.isMyTurn ? (data.penalty > 0 ? `ΦΑΕ ${data.penalty}!` : "ΣΕΙΡΑ ΣΟΥ") : `ΠΑΙΖΕΙ: ${data.currentPlayerName}`;
            ind.style.borderColor = data.isMyTurn ? "#4f4" : "red";

            if(JSON.stringify(data.topCard) !== JSON.stringify(lastTopCard)) {
                updatePile(data.topCard);
                lastTopCard = data.topCard;
            }

            renderHand(data.myHand);
            renderOthers(data.players, data.direction);
        });

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            container.innerHTML = hand.map((c, i) => {
                const color = (c.suit==='♥'||c.suit==='♦') ? 'red' : '';
                return `<div class="card hand-card ${color}" onclick="handlePlay(${i}, '${c.value}', '${c.suit}')"><div class="card-corner">${c.value}<br>${c.suit}</div><div class="card-center">${c.suit}</div></div>`;
            }).join('');
        }

        // Fix Ghost Clicks: throttle clicks
        function handlePlay(idx, val, suit) {
            let now = Date.now();
            if(now - lastClickTime < 500) return;
            lastClickTime = now;

            // "Σαν φύλλο" check: αν το σχήμα είναι ίδιο με το κάτω, μην ανοίγεις modal
            if(val === 'A' && lastTopCard && suit !== lastTopCard.suit) {
                selectedAceIndex = idx;
                document.getElementById('ace-modal').style.display = 'flex';
            } else {
                socket.emit('playCard', { index: idx });
            }
        }

        function confirmAce(s) {
            socket.emit('playCard', { index: selectedAceIndex, declaredSuit: s });
            document.getElementById('ace-modal').style.display = 'none';
        }

        function renderOthers(players, dir) {
            // Απλοποιημένη απόδοση για το παράδειγμα
            const dirText = dir === 1 ? "Δεξιόστροφα ↻" : "Αριστερόστροφα ↺";
            document.getElementById('direction-indicator').innerText = dirText;
        }

        function updatePile(card) {
            const p = document.getElementById('pile-container');
            const color = (card.suit==='♥'||card.suit==='♦') ? 'red' : '';
            p.innerHTML = `<div class="card ${color}" style="position:absolute; transform:rotate(${Math.random()*20-10}deg)"><div class="card-corner">${card.value}<br>${card.suit}</div><div class="card-center">${card.suit}</div></div>`;
        }

        socket.on('revealHands', players => {
            // Εδώ εμφανίζονται τα φύλλα των άλλων στο τέλος του γύρου
            const msg = document.getElementById('msg-overlay');
            msg.innerHTML = "<h2 style='background:black;padding:20px'>Τέλος Γύρου! Αποκάλυψη...</h2>";
            msg.style.display = 'flex';
            setTimeout(() => msg.style.display = 'none', 3000);
        });

        socket.on('gameOver', data => {
            document.getElementById('final-screen').style.display = 'flex';
            document.getElementById('win-text').innerText = `ΝΙΚΗΤΗΣ: ${data.winner}! 🏆`;
        });

        socket.on('notification', m => {
            const o = document.getElementById('msg-overlay');
            o.innerHTML = `<div style="background:rgba(0,0,0,0.8);padding:10px">${m}</div>`;
            o.style.display = 'flex';
            setTimeout(() => o.style.display='none', 2000);
        });

        socket.on('updateScoreboard', data => {
            const t = document.getElementById('score-table');
            if(!data.history.length) return;
            let keys = Object.keys(data.history[0]);
            let html = `<tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr>`;
            data.history.forEach(row => {
                html += `<tr>${keys.map(k=>`<td>${row[k]}</td>`).join('')}</tr>`;
            });
            t.innerHTML = html;
        });
    </script>
</body>
</html>
