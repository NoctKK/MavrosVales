<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        :root { --gold: #d4af37; --felt: radial-gradient(circle at center, #2e5c3e 0%, #13351f 100%); --panel-bg: rgba(0, 0, 0, 0.85); }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }

        #game-wrapper { width: 1280px; height: 720px; position: relative; background: var(--felt); box-shadow: inset 0 0 200px rgba(0,0,0,0.9); border: 15px solid #2b1d12; box-sizing: border-box; display: grid; grid-template-areas: ". top ." "left center right" ". bottom ."; grid-template-columns: 250px 1fr 250px; grid-template-rows: 150px 1fr 220px; transform-origin: center center; }

        /* NOTIFICATIONS & OVERLAYS */
        #msg-overlay { display: none; position: absolute; top: -60px; left: 50%; transform: translateX(-50%); z-index: 6000; font-size: 28px; color: var(--gold); font-weight: bold; text-shadow: 2px 2px 10px black; pointer-events: none; text-align: center; width: 400px; white-space: nowrap; justify-content: center; }
        #active-suit-display { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; z-index: 100; text-shadow: 0 0 20px black; display: none; pointer-events: none; opacity: 0.6; }

        /* CHAT & AUDIO CONTROLS */
        #mute-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: 2px solid var(--gold); color: var(--gold); border-radius: 50%; width: 45px; height: 45px; cursor: pointer; z-index: 7000; font-size: 20px; }
        #chat-toggle { position: absolute; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; border: none; font-size: 30px; cursor: pointer; z-index: 7000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #chat-box { position: absolute; bottom: 90px; left: 20px; width: 300px; height: 350px; background: var(--panel-bg); border: 2px solid var(--gold); border-radius: 10px; display: none; flex-direction: column; z-index: 7000; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; color: #eee; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        #chat-input { flex: 1; background: #222; border: 1px solid var(--gold); color: white; padding: 8px; border-radius: 5px; outline: none; }

        /* ORIGINAL UI COMPONENTS */
        .player-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #slot-bottom { grid-area: bottom; align-self: center; width: 100%; }
        .player-info { background: var(--panel-bg); border: 2px solid var(--gold); border-radius: 10px; padding: 5px 15px; text-align: center; min-width: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .player-name { font-weight: bold; color: var(--gold); font-size: 16px; }
        .player-score { font-size: 14px; color: #4f4; }
        
        .card { width: 110px; height: 160px; background: white; color: black; border-radius: 10px; border: 1px solid #ccc; position: relative; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s; flex-shrink: 0; }
        .card.red { color: #d00; }
        .card-corner { position: absolute; top: 5px; left: 5px; font-size: 24px; font-weight: bold; line-height: 1; text-align: center; }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; }
        .hand-card { margin-left: -55px; }
        .hand-card:hover { transform: translateY(-30px); z-index: 100; }

        #game-center { grid-area: center; display: flex; align-items: center; justify-content: center; gap: 40px; }
        #pile-container { width: 110px; height: 160px; position: relative; }
        #draw-pile { width: 100px; height: 145px; background: linear-gradient(135deg, #8e2424, #4d0000); border: 3px solid white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        
        #start-screen { position: fixed; inset: 0; z-index: 8000; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-btn { background: linear-gradient(to bottom, #4a4a4a, #2a2a2a); border: 2px solid var(--gold); color: var(--gold); padding: 15px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #turn-indicator { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); padding: 10px 25px; background: #1a472a; border: 3px solid #4f4; border-radius: 15px; font-weight: bold; }
        #scoreboard { position: absolute; top: 20px; left: 20px; background: var(--panel-bg); border: 2px solid var(--gold); padding: 10px; border-radius: 10px; display: none; z-index: 1000; max-height: 250px; overflow-y: auto; }
        table { border-collapse: collapse; color: white; }
        th, td { padding: 5px 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <button id="mute-btn" onclick="toggleMute()">🔊</button>

    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:70px; margin-bottom:20px;">Μαύρος Βαλές ♠️</h1>
        <div id="login-area" style="text-align:center;">
            <input type="text" id="username" placeholder="Όνομα..." style="padding:12px; font-size:24px; border-radius:8px; border:none; width:250px; text-align:center; margin-bottom:20px;">
            <br>
            <button class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ</button>
        </div>
        <div id="waiting-area" style="display:none; text-align:center;">
            <p id="waiting-msg" style="font-size:24px; color:var(--gold);">Συνδεδεμένοι παίκτες: 0</p>
            <button id="start-btn" class="game-btn" style="display:none; border-color:#4f4; color:#4f4;" onclick="socket.emit('startGameRequest')">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="turn-indicator">ΣΥΝΔΕΣΗ...</div>
        <div id="active-suit-display"></div>
        <div id="scoreboard" onclick="this.style.display='none'"><table id="score-table"></table></div>

        <button id="chat-toggle" onclick="toggleChat()">💬</button>
        <div id="chat-box">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Πες κάτι..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>
        <div id="slot-right" class="player-slot"></div>

        <div id="game-center">
            <div id="draw-pile" onclick="socket.emit('drawCard')">
                <div style="font-size:14px; color:#ccc;">ΤΡΑΒΑ</div>
                <div id="deck-count" style="font-size:30px; font-weight:bold; color:var(--gold);">52</div>
            </div>
            <div id="pile-container">
                <div id="msg-overlay"></div>
            </div>
            <button class="game-btn" onclick="socket.emit('passTurn')">ΠΑΣΟ</button>
        </div>

        <div id="slot-bottom" class="player-slot">
            <div id="my-hand-container" style="display:flex; justify-content:center; align-items:center; height:180px;"></div>
        </div>
    </div>

    <div id="ace-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9000; align-items:center; justify-content:center;">
        <div style="text-align:center;">
            <h2 style="color:var(--gold); font-size:40px; margin-bottom:30px;">Διάλεξε Χρώμα</h2>
            <button onclick="confirmAce('♥')" style="font-size:60px; color:red; background:white; border-radius:15px; margin:10px; cursor:pointer;">♥</button>
            <button onclick="confirmAce('♦')" style="font-size:60px; color:red; background:white; border-radius:15px; margin:10px; cursor:pointer;">♦</button>
            <button onclick="confirmAce('♣')" style="font-size:60px; color:black; background:white; border-radius:15px; margin:10px; cursor:pointer;">♣</button>
            <button onclick="confirmAce('♠')" style="font-size:60px; color:black; background:white; border-radius:15px; margin:10px; cursor:pointer;">♠</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isMuted = false, myId, selectedAceIndex, lastTopCard = null;
        
        // Ήχοι 1 δευτερολέπτου
        const sfx = {
            draw: new Audio('https://www.soundjay.com/buttons/sounds/button-27.mp3'),
            play: new Audio('https://www.soundjay.com/buttons/sounds/button-50.mp3'),
            notif: new Audio('https://www.soundjay.com/buttons/sounds/beep-07.mp3')
        };

        function playSfx(type) { if(!isMuted) sfx[type].play().catch(()=>{}); }
        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊"; }

        function joinGame() {
            const name = document.getElementById('username').value;
            if(!name) return alert("Όνομα!");
            let sid = sessionStorage.getItem('mv_session') || 'sess_'+Math.random();
            sessionStorage.setItem('mv_session', sid);
            socket.emit('joinGame', { username: name, sessionId: sid });
            document.getElementById('login-area').style.display='none';
            document.getElementById('waiting-area').style.display='block';
        }

        socket.on('chatUpdate', (data) => {
            const m = document.getElementById('chat-messages');
            m.innerHTML += `<div><b style="color:var(--gold)">${data.name}:</b> ${data.text}</div>`;
            m.scrollTop = m.scrollHeight;
        });

        function sendChat() {
            const i = document.getElementById('chat-input');
            if(i.value) { socket.emit('chatMessage', i.value); i.value=''; }
        }

        function toggleChat() {
            const b = document.getElementById('chat-box');
            b.style.display = b.style.display === 'flex' ? 'none' : 'flex';
        }

        socket.on('notification', (msg) => {
            const o = document.getElementById('msg-overlay');
            o.innerText = msg; o.style.display = 'flex';
            playSfx('notif');
            setTimeout(() => o.style.display = 'none', 2500);
        });

        socket.on('updateUI', (data) => {
            myId = socket.id;
            document.getElementById('deck-count').innerText = data.deckCount;
            document.getElementById('turn-indicator').innerText = data.isMyTurn ? "ΔΙΚΗ ΣΟΥ ΣΕΙΡΑ!" : "ΠΑΙΖΕΙ: " + data.currentPlayerName;
            document.getElementById('turn-indicator').style.borderColor = data.isMyTurn ? "#4f4" : "#f44";

            renderHand(data.myHand);
            distributePlayers(data.players);
            
            if(data.topCard && JSON.stringify(data.topCard) !== JSON.stringify(lastTopCard)) {
                updatePile(data.topCard);
                lastTopCard = data.topCard;
            }

            const sd = document.getElementById('active-suit-display');
            sd.innerText = data.activeSuit || '';
            sd.style.display = data.activeSuit ? 'block' : 'none';
            sd.style.color = (data.activeSuit === '♥' || data.activeSuit === '♦') ? '#ff4444' : '#222';
        });

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            container.innerHTML = hand.map((c, i) => `
                <div class="card hand-card ${c.color==='red'?'red':''}" style="margin-left: ${i===0?0:-55}px" onclick="playLogic(${i}, '${c.value}', '${c.suit}')">
                    <div class="card-corner">${c.value}<div>${c.suit}</div></div>
                    <div class="card-center">${c.suit}</div>
                </div>
            `).join('');
        }

        function playLogic(idx, val, suit) {
            if(val === 'A') { selectedAceIndex = idx; document.getElementById('ace-modal').style.display='flex'; }
            else { playSfx('play'); socket.emit('playCard', { index: idx }); }
        }

        function confirmAce(suit) {
            document.getElementById('ace-modal').style.display='none';
            playSfx('play'); socket.emit('playCard', { index: selectedAceIndex, declaredSuit: suit });
        }

        function updatePile(card) {
            const container = document.getElementById('pile-container');
            if(container.children.length > 6) container.removeChild(container.children[1]);
            const div = document.createElement('div');
            div.className = `card ${card.color==='red'?'red':''}`;
            div.style.position = 'absolute';
            div.style.transform = `rotate(${Math.random()*30-15}deg)`;
            div.innerHTML = `<div class="card-corner">${card.value}<div>${card.suit}</div></div><div class="card-center">${card.suit}</div>`;
            container.appendChild(div);
            playSfx('play');
        }

        function distributePlayers(players) {
            const others = players.filter(p => p.id !== myId);
            const slots = ['slot-left', 'slot-top', 'slot-right'];
            slots.forEach(s => document.getElementById(s).innerHTML='');
            others.forEach((p, i) => {
                if(slots[i]) document.getElementById(slots[i]).innerHTML = `
                    <div class="player-info" style="opacity: ${p.connected?1:0.5}">
                        <div class="player-name">${p.name}</div>
                        <div class="player-score">Φύλλα: ${p.handCount}</div>
                        <div style="font-size:20px">${"🎩".repeat(p.hats)}</div>
                    </div>`;
            });
        }

        socket.on('gameReady', () => { document.getElementById('start-screen').style.display='none'; document.getElementById('scoreboard').style.display='block'; });
        socket.on('playerCountUpdate', (c) => {
            document.getElementById('waiting-msg').innerText = `Συνδεδεμένοι παίκτες: ${c}`;
            document.getElementById('start-btn').style.display = c >= 2 ? 'inline-block' : 'none';
        });
        socket.on('updateScoreboard', (h) => {
            if(!h.length) return;
            const names = Object.keys(h[0]);
            let html = `<tr>${names.map(n=>`<th>${n}</th>`).join('')}</tr>`;
            h.slice(-5).forEach(r => { html += `<tr>${names.map(n=>`<td>${r[n]}</td>`).join('')}</tr>`; });
            document.getElementById('score-table').innerHTML = html;
        });
    </script>
</body>
</html>
