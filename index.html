<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        :root { --gold: #d4af37; --felt: radial-gradient(circle at center, #2e5c3e 0%, #13351f 100%); }
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #game-wrapper { width: 1280px; height: 720px; position: relative; background: var(--felt); border: 15px solid #2b1d12; box-sizing: border-box; display: grid; grid-template-areas: ". top ." "left center right" ". bottom ."; grid-template-columns: 250px 1fr 250px; grid-template-rows: 150px 1fr 220px; transform-origin: center center; }

        /* NOTIFICATIONS - Πάνω από τη στοίβα */
        #msg-overlay { display: none; position: absolute; top: -70px; left: 50%; transform: translateX(-50%); z-index: 6000; font-size: 24px; color: var(--gold); font-weight: bold; text-shadow: 2px 2px 10px black; pointer-events: none; text-align: center; width: 400px; white-space: nowrap; justify-content: center; }

        /* CHAT SYSTEM */
        #chat-toggle { position: absolute; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; border: none; font-size: 30px; cursor: pointer; z-index: 7000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #chat-box { position: absolute; bottom: 90px; left: 20px; width: 300px; height: 400px; background: rgba(0,0,0,0.9); border: 2px solid var(--gold); border-radius: 10px; display: none; flex-direction: column; z-index: 7000; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: #222; border: 1px solid var(--gold); color: white; padding: 5px; border-radius: 5px; }

        /* GAME ELEMENTS */
        .player-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #slot-bottom { grid-area: bottom; width: 100%; }
        .player-info { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 10px; padding: 5px 15px; text-align: center; min-width: 140px; margin-bottom: 5px; }
        .card { width: 110px; height: 160px; background: white; color: black; border-radius: 10px; position: relative; cursor: pointer; transition: transform 0.1s; flex-shrink: 0; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); }
        .card.red { color: #d00; }
        .hand-card { margin-left: -55px; }
        #pile-container { width: 110px; height: 160px; position: relative; grid-area: center; }
        #game-center { grid-area: center; display: flex; align-items: center; justify-content: center; gap: 40px; }
        #draw-pile { width: 100px; height: 145px; background: linear-gradient(135deg, #8e2424, #4d0000); border: 3px solid white; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #start-screen { position: fixed; inset: 0; z-index: 8000; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-btn { background: #333; border: 2px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #active-suit-display { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; pointer-events: none; opacity: 0.3; }
        #scoreboard { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); padding: 10px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:60px;">Μαύρος Βαλές ♠️</h1>
        <input type="text" id="username" placeholder="Όνομα..." style="padding:10px; font-size:20px; text-align:center;">
        <br>
        <button class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ</button>
        <div id="waiting-area" style="display:none; margin-top:20px;">
            <p id="waiting-msg">Περιμένοντας παίκτες...</p>
            <button id="start-btn" class="game-btn" style="display:none;" onclick="socket.emit('startGameRequest')">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="active-suit-display"></div>
        <div id="scoreboard" onclick="this.style.display='none'">
            <table id="score-table"></table>
        </div>

        <button id="chat-toggle" onclick="toggleChat()">💬</button>
        <div id="chat-box">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Πες κάτι..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>
        <div id="slot-right" class="player-slot"></div>

        <div id="game-center">
            <div id="draw-pile" onclick="playSfx('draw'); socket.emit('drawCard')">
                <div style="font-size:12px;">ΤΡΑΒΑ</div>
                <div id="deck-count" style="font-size:24px; color:var(--gold);">52</div>
            </div>
            <div id="pile-container">
                <div id="msg-overlay"></div>
            </div>
            <button class="game-btn" onclick="socket.emit('passTurn')">ΠΑΣΟ</button>
        </div>

        <div id="slot-bottom" class="player-slot">
            <div id="my-hand-container" style="display:flex;"></div>
        </div>
    </div>

    <div id="ace-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9000; align-items:center; justify-content:center;">
        <div style="text-align:center;">
            <h2 style="color:var(--gold);">Διάλεξε Χρώμα</h2>
            <button onclick="confirmAce('♥')" style="font-size:40px; color:red;">♥</button>
            <button onclick="confirmAce('♦')" style="font-size:40px; color:red;">♦</button>
            <button onclick="confirmAce('♣')" style="font-size:40px; color:black;">♣</button>
            <button onclick="confirmAce('♠')" style="font-size:40px; color:black;">♠</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const sfx = {
            draw: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),
            play: new Audio('https://assets.mixkit.co/active_storage/sfx/2016/2016-preview.mp3'),
            notif: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3')
        };
        let myId, selectedAceIndex;

        function playSfx(name) { sfx[name].play().catch(() => {}); }

        function joinGame() {
            const name = document.getElementById('username').value;
            if (!name) return alert("Βάλε όνομα!");
            let sid = sessionStorage.getItem('mv_session') || 'sess_' + Math.random();
            sessionStorage.setItem('mv_session', sid);
            socket.emit('joinGame', { username: name, sessionId: sid });
            document.getElementById('username').style.display = 'none';
            document.getElementById('waiting-area').style.display = 'block';
        }

        socket.on('chatUpdate', (data) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div><b>${data.name}:</b> ${data.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (input.value) { socket.emit('chatMessage', input.value); input.value = ''; }
        }

        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        socket.on('notification', (msg) => {
            const o = document.getElementById('msg-overlay');
            o.innerText = msg; o.style.display = 'flex';
            playSfx('notif');
            setTimeout(() => o.style.display = 'none', 2500);
        });

        socket.on('updateUI', (data) => {
            myId = socket.id;
            document.getElementById('deck-count').innerText = data.deckCount;
            renderHand(data.myHand);
            distributePlayers(data.players);
            if(data.topCard) updatePile(data.topCard);
            const suitDisp = document.getElementById('active-suit-display');
            suitDisp.innerText = data.activeSuit || '';
            suitDisp.style.color = (data.activeSuit === '♥' || data.activeSuit === '♦') ? 'red' : 'black';
        });

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            container.innerHTML = hand.map((c, i) => `
                <div class="card hand-card ${c.color==='red'?'red':''}" onclick="playLogic(${i}, '${c.value}', '${c.suit}')">
                    <div style="padding:5px;">${c.value}${c.suit}</div>
                    <div style="font-size:40px; text-align:center; margin-top:20px;">${c.suit}</div>
                </div>
            `).join('');
        }

        function playLogic(index, value, suit) {
            if (value === 'A') { selectedAceIndex = index; document.getElementById('ace-modal').style.display = 'flex'; }
            else { playSfx('play'); socket.emit('playCard', { index: index }); }
        }

        function confirmAce(suit) {
            document.getElementById('ace-modal').style.display = 'none';
            playSfx('play'); socket.emit('playCard', { index: selectedAceIndex, declaredSuit: suit });
        }

        function updatePile(card) {
            const container = document.getElementById('pile-container');
            if(container.children.length > 5) container.removeChild(container.children[1]); // Keep overlay
            const div = document.createElement('div');
            div.className = `card ${card.color==='red'?'red':''}`;
            div.style.position = 'absolute';
            div.style.transform = `rotate(${Math.random()*20-10}deg)`;
            div.innerHTML = `<div style="padding:5px;">${card.value}${card.suit}</div><div style="font-size:40px; text-align:center;">${card.suit}</div>`;
            container.appendChild(div);
        }

        function distributePlayers(players) {
            const others = players.filter(p => p.id !== socket.id);
            const slots = ['slot-left', 'slot-top', 'slot-right'];
            slots.forEach(s => document.getElementById(s).innerHTML = '');
            others.forEach((p, i) => {
                if(slots[i]) document.getElementById(slots[i]).innerHTML = `<div class="player-info">${p.name}<br>Φύλλα: ${p.handCount} ${"🎩".repeat(p.hats)}</div>`;
            });
        }

        socket.on('gameReady', () => document.getElementById('start-screen').style.display = 'none');
        socket.on('playerCountUpdate', (c) => {
            document.getElementById('waiting-msg').innerText = `Παίκτες: ${c}`;
            document.getElementById('start-btn').style.display = c >= 2 ? 'block' : 'none';
        });
    </script>
</body>
</html>
