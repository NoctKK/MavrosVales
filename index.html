<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        /* === CSS CONSTANTS & RESET === */
        :root { 
            --gold: #d4af37; 
            --panel-bg: rgba(0, 0, 0, 0.9);
            --felt-green: radial-gradient(circle at center, #0b6b38 0%, #05351c 80%);
            --card-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* ΚΛΕΙΔΩΜΑ ΓΡΑΜΜΑΤΩΝ ΓΙΑ ΚΙΝΗΤΑ - FIX ΓΙΑ FONT BOOSTING */
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            max-height: 1000000px;
        }

        body { 
            background: #000;
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === 3D VIEWPORT & SCALING === */
        #game-wrapper {
            width: 1280px; 
            height: 720px;
            background: var(--felt-green);
            position: relative;
            display: grid;
            grid-template-areas: 
                ". top ."
                "left center right"
                ". bottom .";
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 150px 1fr 280px;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            border: 12px solid #2b1d12;
            border-radius: 50px;
            transform-origin: center center;
            flex-shrink: 0;
            backface-visibility: hidden;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        #game-wrapper::before {
            content: "";
            position: absolute;
            inset: -40px;
            border-radius: 60px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8) inset;
            pointer-events: none;
            z-index: 1; 
        }

        /* === UI COMPONENTS === */
        .panel {
            background: var(--panel-bg); 
            border: 2px solid var(--gold); 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 10;
            padding: 12px;
            box-sizing: border-box;
        }
        
        .card-base {
            width: 110px; 
            height: 160px; 
            background: white; 
            border-radius: 10px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            color: black;
            position: relative;
            box-shadow: var(--card-shadow);
            will-change: transform;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
        }

        /* === ΟΙ ΔΙΟΡΘΩΣΕΙΣ ΠΟΥ ΖΗΤΗΣΕΣ ΓΙΑ ΤΑ REVEALED HANDS === */
        .player-cards {
            display: flex;
            flex-wrap: wrap; 
            gap: 5px; 
            justify-content: center;
            position: relative;
            padding-bottom: 10px; 
            max-width: 220px;
            margin-top: 10px;
        }

        .player-cards .card {
            width: 50px; 
            height: 70px;
            margin-left: -20px; 
            z-index: 1;
            background: white;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            position: relative;
            color: black;
        }

        .player-cards .card:first-child {
            margin-left: 0;
        }

        .player-cards .stacked .card {
            margin-left: -35px; 
        }

        /* === MESSAGES & NOTIFICATIONS === */
        #msg-overlay { 
            display: none; 
            position: fixed; 
            top: 30%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 20000; 
            font-size: 32px; 
            color: var(--gold); 
            font-weight: bold; 
            text-shadow: 3px 3px 10px black; 
            pointer-events: none; 
            text-align: center; 
            width: 700px;
            white-space: pre-line; 
            line-height: 1.4;
        }

        @keyframes popMsg {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #victory-screen {
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 30000;
            background: rgba(0,0,0,0.95); 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* === CHAT & UI ELEMENTS === */
        #chat-toggle { 
            position: absolute; bottom: 25px; left: 25px; width: 65px; height: 65px; 
            background: var(--gold); border-radius: 50%; border: none; font-size: 35px; 
            cursor: pointer; z-index: 7000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
            transition: transform 0.2s;
        }
        #chat-toggle:active { transform: scale(0.9); }
        
        #chat-box { 
            position: absolute; bottom: 100px; left: 25px; width: 320px; height: 400px; 
            display: none; flex-direction: column; z-index: 7000; 
        }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 15px; color: #fff; text-align: left; background: rgba(0,0,0,0.3); border-radius: 8px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; gap: 8px; }
        #chat-input { flex: 1; background: #111; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 6px; outline: none; }

        #reconnect-btn { 
            position: absolute; bottom: 25px; left: 100px; height: 65px; padding: 0 25px; 
            background: #b30000; border-radius: 35px; border: 3px solid var(--gold); 
            font-size: 20px; font-weight: bold; cursor: pointer; z-index: 7000; 
            color: white; display: none; align-items: center; justify-content: center; 
        }

        /* === LOGIN SCREEN === */
        #start-screen { 
            position: fixed; inset: 0; z-index: 40000; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .name-input {
            background: transparent; border: none; border-bottom: 4px solid var(--gold);
            color: white; font-size: 35px; text-align: center; padding: 10px;
            margin-bottom: 40px; outline: none; width: 350px; transition: border-color 0.3s;
        }
        .name-input:focus { border-color: #fff; }

        .game-btn { 
            background: linear-gradient(to bottom, #d4af37, #aa8a2e); 
            border: none; border-radius: 12px; color: black; 
            padding: 18px 45px; font-size: 22px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 6px 0 #7a601a; transition: all 0.1s;
        }
        .game-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #7a601a; }
        .game-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* === PLAYER SLOTS === */
        .player-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        #slot-top { grid-area: top; }
        #slot-left { grid-area: left; }
        #slot-right { grid-area: right; }
        #slot-bottom { grid-area: bottom; align-self: center; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .player-info { position: relative; padding: 8px 20px; text-align: center; min-width: 160px; margin-bottom: 8px; transition: all 0.3s ease; border: 2px solid var(--gold); border-radius: 10px; background: var(--panel-bg); }
        .player-info.active { border-color: #4f4; box-shadow: 0 0 20px #4f4; background: rgba(0, 60, 0, 0.9); }
        .player-name { font-weight: bold; font-size: 18px; margin-bottom: 2px; }

        .card-count-box { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--gold); border-radius: 6px; padding: 4px 12px; font-size: 14px; color: white; margin-top: 5px; font-weight: bold; }

        /* === MY HAND LAYOUT === */
        #my-hand-container { 
            width: 100%; display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 12px; padding: 15px; overflow-y: auto; max-height: 250px;
            transition: opacity 0.3s;
        }
        
        .hand-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        
        @media (hover: hover) and (pointer: fine) {
            .hand-card:hover { 
                transform: translateY(-50px) scale(1.15); 
                z-index: 10000 !important; 
                box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            }
        }

        #turn-indicator { padding: 10px 30px; background: #1a472a; border: 3px solid #4f4; border-radius: 20px; font-weight: bold; font-size: 20px; color: white; box-shadow: 0 0 15px rgba(79, 255, 68, 0.3); }

        /* === GAME CENTER === */
        #game-center { grid-area: center; display: flex; align-items: center; justify-content: center; gap: 50px; }
        #draw-pile { 
            width: 110px; height: 160px; background: linear-gradient(135deg, #8e2424, #4d0000); border: 4px solid white; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 10px 10px 25px rgba(0,0,0,0.6); transition: transform 0.2s;
        }
        #draw-pile:hover { transform: scale(1.05); }
        #deck-count { font-size: 40px; font-weight: bold; color: var(--gold); margin-top: 5px; }

        #pile-container { width: 110px; height: 160px; position: relative; perspective: 1000px; }
        .pile-card { position: absolute; top: 0; left: 0; border: 1px solid #aaa; }

        .red { color: #d00 !important; }
        .card-corner { position: absolute; top: 8px; left: 8px; font-size: 24px; font-weight: bold; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card-corner.bottom { top: auto; bottom: 8px; left: auto; right: 8px; transform: rotate(180deg); }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 75px; }

        /* === ACE MODAL === */
        #ace-modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); z-index: 50000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        #ace-content { background: #111; padding: 50px; border-radius: 30px; border: 4px solid var(--gold); text-align: center; box-shadow: 0 0 50px rgba(212, 175, 55, 0.3); }
        .suit-btn { 
            width: 110px; height: 110px; font-size: 65px; background: white; 
            border: 5px solid var(--gold); border-radius: 20px; margin: 15px; cursor: pointer; 
            transition: transform 0.1s;
        }
        .suit-btn:active { transform: scale(0.9); }

        #scoreboard { position: absolute; top: 25px; left: 25px; padding: 15px; z-index: 1000; font-size: 16px; display: none; color: white; cursor: pointer; max-height: 500px; overflow-y: auto; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid var(--gold); padding: 10px; text-align: center; }
        th { background: rgba(212, 175, 55, 0.2); }

        #error-overlay { display: none; position: fixed; inset: 0; z-index: 100000; background: rgba(130, 0, 0, 0.98); flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        
        .flying-card { position: fixed; z-index: 99999; pointer-events: none; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 15px 15px 40px rgba(0,0,0,0.6); }
        
        @keyframes shake { 0%, 100% {transform:translateX(0);} 20% {transform:translateX(-8px);} 40% {transform:translateX(8px);} 60% {transform:translateX(-8px);} 80% {transform:translateX(8px);} }
        .shake { animation: shake 0.4s; border-color: #ff4444 !important; }
    </style>
</head>
<body>

    <div id="error-overlay">
        <h1 style="font-size: 50px; margin-bottom: 20px;">🚨 ΣΦΑΛΜΑ ΣΥΣΤΗΜΑΤΟΣ</h1>
        <p id="error-text" style="font-family: monospace; background: black; padding: 25px; border-radius: 10px; max-width: 80%; font-size: 18px; color: #ff6666; border: 1px solid #ff4444;"></p>
        <button class="game-btn" onclick="window.location.reload()" style="margin-top: 40px; background: white; color: black;">ΕΠΑΝΑΦΟΡΤΩΣΗ ΣΕΛΙΔΑΣ</button>
    </div>

    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:90px; margin-bottom:20px; text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);">Μαύρος Βαλές ♠️</h1>
        <div id="login-area" style="display:flex; flex-direction:column; align-items:center;">
            <input type="text" id="username" class="name-input" placeholder="Το όνομά σου..." maxlength="15" autocomplete="off">
            <button class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ ΣΤΟ ΤΡΑΠΕΖΙ</button>
        </div>
        <div id="waiting-area" style="display:none; text-align:center;">
            <p id="waiting-msg" style="color:white; font-size:28px; margin-bottom:30px; letter-spacing: 1px;">Αναμονή για παίκτες...</p>
            <button id="start-btn" class="game-btn" onclick="startGameRequest()" style="display:none; background: #4f4; color: black; box-shadow: 0 6px 0 #2a8a2a;">ΕΝΑΡΞΗ ΠΑΙΧΝΙΔΙΟΥ</button>
        </div>
    </div>

    <div id="msg-overlay"></div>

    <div id="victory-screen">
        <h1 id="victory-msg" style="color: white; font-size: 60px; text-shadow: 0 0 30px #4f4; margin-bottom: 50px;">🏆</h1>
        <button class="game-btn" style="background: #4f4; color: black; font-size: 30px;" onclick="location.reload()">ΠΑΙΞΕ ΞΑΝΑ</button>
    </div>

    <div id="game-wrapper">
        
        <div id="ace-modal">
            <div id="ace-content">
                <h2 style="color:var(--gold); font-size: 45px; margin-bottom:30px;">Διάλεξε Χρώμα</h2>
                <div style="display: flex; justify-content: center;">
                    <button class="suit-btn" style="color:red;" onclick="confirmAce('♥')">♥</button>
                    <button class="suit-btn" style="color:red;" onclick="confirmAce('♦')">♦</button>
                    <button class="suit-btn" style="color:black;" onclick="confirmAce('♣')">♣</button>
                    <button class="suit-btn" style="color:black;" onclick="confirmAce('♠')">♠</button>
                </div>
                <button class="game-btn" style="margin-top:40px; font-size:18px; background: #444; color: white; box-shadow: 0 4px 0 #222;" onclick="cancelAce()">ΑΚΥΡΩΣΗ</button>
            </div>
        </div>

        <div id="scoreboard" class="panel" onclick="this.style.display='none'">
            <h3 style="color: var(--gold); text-align: center; margin-top: 0;">Στατιστικά Παρτίδας</h3>
            <table id="score-table"></table>
            <p style="font-size: 12px; text-align: center; color: #888; margin-top: 15px;">(Κάνε κλικ για απόκρυψη)</p>
        </div>

        <button id="chat-toggle" onclick="toggleChat()">💬</button>
        <button id="reconnect-btn" onclick="forceReconnect()">🔄 ΕΠΑΝΑΣΥΝΔΕΣΗ</button>
        
        <div id="chat-box" class="panel">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Γράψε ένα μήνυμα..." maxlength="80" onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>

        <div id="top-right-ui">
            <div id="turn-indicator">ΣΥΝΔΕΣΗ...</div>
        </div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>

        <div id="game-center">
            <div id="draw-pile" onclick="handleDrawClick()">
                <div style="color:white; font-weight:bold; letter-spacing: 2px;">ΤΡΑΒΑ</div>
                <div id="deck-count">--</div>
            </div>
            <div id="pile-container">
                </div>
            <button class="game-btn" style="padding: 15px 30px; font-size: 18px;" onclick="socket.emit('passTurn')">ΠΑΣΟ</button>
        </div>

        <div id="slot-right" class="player-slot"></div>
        
        <div id="slot-bottom" class="player-slot">
            <div id="my-info-container"></div>
            <div id="my-hand-container"></div> 
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        /**
         * GLOBAL ERROR CATCHER
         * Αυτό πιάνει κάθε σφάλμα Javascript και το δείχνει στην οθόνη.
         */
        window.onerror = function(msg, url, line, col, error) {
            const overlay = document.getElementById('error-overlay');
            const text = document.getElementById('error-text');
            if(overlay && text) {
                overlay.style.display = 'flex';
                text.innerText = `[JS Error]: ${msg}\nLocation: ${url}\nLine: ${line}:${col}`;
            }
            return false;
        };

        // === GLOBALS & CONFIG ===
        const socket = io();
        let myId = null;
        let lastClick = 0;
        const CLICK_DELAY = 450; 
        let actionLocked = false;
        let gameScale = 1;
        let selectedAceIndex = null;
        let msgQueue = [];
        let isMsgShowing = false;
        let fullScoreHistory = [];

        /**
         * NOTIFICATION QUEUE SYSTEM
         * Διαχειρίζεται τα μηνύματα ένα-προς-ένα για να μην χάνονται.
         */
        function showNextMsg() {
            const o = document.getElementById('msg-overlay');
            if(!o) return;
            
            if (msgQueue.length === 0) {
                isMsgShowing = false;
                o.style.display = 'none';
                return;
            }

            isMsgShowing = true;
            o.innerText = msgQueue.shift(); 
            o.style.display = 'block';
            o.style.animation = 'none';
            o.offsetHeight; // trigger reflow
            o.style.animation = 'popMsg 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            
            setTimeout(() => {
                o.style.display = 'none';
                setTimeout(showNextMsg, 250); 
            }, 2200); 
        }

        /**
         * DYNAMIC SCALING (FIX ΓΙΑ ΤΑ ΚΙΝΗΤΑ)
         * Κάνει το game-wrapper να γεμίζει την οθόνη χωρίς μαύρες μπάρες.
         */
        function resizeGame() {
            const wrapper = document.getElementById('game-wrapper');
            if(!wrapper) return;
            
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const targetW = 1280;
            const targetH = 720;
            
            gameScale = Math.min(ww / targetW, wh / targetH);
            wrapper.style.transform = `scale(${gameScale})`;
        }
        window.addEventListener('resize', resizeGame);
        resizeGame(); // Initial call

        // === SOCKET EVENT HANDLERS ===

        socket.on('connect', () => {
            document.getElementById('reconnect-btn').style.display = 'none';
            myId = socket.id;
            const name = sessionStorage.getItem('mv_username');
            const session = sessionStorage.getItem('mv_session');
            if(name && session && document.getElementById('start-screen').style.display === 'none') {
                socket.emit('joinGame', { username: name, sessionId: session });
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('reconnect-btn').style.display = 'flex';
        });

        socket.on('updateUI', data => {
            actionLocked = false;
            window.currentScoreData = data;
            document.getElementById('deck-count').innerText = data.deckCount;
            
            const ind = document.getElementById('turn-indicator');
            const handCont = document.getElementById('my-hand-container');
            
            if (ind && handCont) {
                if (data.isMyTurn) {
                    ind.innerText = data.penalty > 0 ? `⚠️ ΦΑΕ ${data.penalty} ΦΥΛΛΑ!` : "ΔΙΚΗ ΣΟΥ ΣΕΙΡΑ";
                    ind.style.borderColor = "#4f4";
                    ind.style.boxShadow = "0 0 20px rgba(0, 255, 0, 0.4)";
                    handCont.style.opacity = "1";
                    handCont.style.pointerEvents = "auto";
                } else {
                    ind.innerText = `ΠΑΙΖΕΙ: ${data.currentPlayerName}`;
                    ind.style.borderColor = "#ff4444";
                    ind.style.boxShadow = "none";
                    handCont.style.opacity = "0.7";
                    handCont.style.pointerEvents = "none";
                }
            }

            renderHand(data.myHand);
            if (data.topCard) updatePile(data.topCard);
            distributePlayers(data.players, data.currentPlayerId);
        });

        /**
         * EVENT DELEGATION ΓΙΑ ΤΑ ΦΥΛΛΑ
         * Βελτιώνει την απόδοση στα κινητά.
         */
        document.getElementById('my-hand-container').addEventListener('click', function(e) {
            const cardEl = e.target.closest('.hand-card');
            if (!cardEl || actionLocked) return;
            
            const index = parseInt(cardEl.getAttribute('data-index'), 10);
            const value = cardEl.getAttribute('data-value');
            const suit = cardEl.getAttribute('data-suit');
            
            handleCardPlay(index, value, suit, cardEl);
        });

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            if(!container) return;
            
            // Επιλογή layout βάσει πλήθους φύλλων
            container.className = hand.length > 14 ? 'hand-compact' : 'hand-normal';
            
            const frag = document.createDocumentFragment();
            hand.forEach((c, i) => {
                if(!c) return;
                const div = document.createElement("div");
                const isRed = (c.suit === '♥' || c.suit === '♦');
                div.className = `card-base hand-card card-${i} ${isRed ? 'red' : ''}`;
                
                div.setAttribute('data-index', i);
                div.setAttribute('data-value', c.value);
                div.setAttribute('data-suit', c.suit);
                div.style.zIndex = i;

                div.innerHTML = `
                    <div class="card-corner">${c.value}<div>${c.suit}</div></div>
                    <div class="card-center">${c.suit}</div>
                    <div class="card-corner bottom">${c.value}<div>${c.suit}</div></div>`;
                
                frag.appendChild(div);
            });

            container.innerHTML = "";
            container.appendChild(frag);
        }

        function handleCardPlay(index, value, suit, element) {
            if (Date.now() - lastClick < CLICK_DELAY) return;

            if (value === 'A') {
                selectedAceIndex = index;
                document.getElementById('ace-modal').style.display = 'flex';
                return;
            }

            animateThrow(element);
            executeAction(() => socket.emit('playCard', { index: index }));
        }

        function confirmAce(chosenSuit) {
            if (selectedAceIndex === null) return;
            const element = document.querySelector(`.card-${selectedAceIndex}`);
            if(element) animateThrow(element);
            
            executeAction(() => {
                socket.emit('playCard', { index: selectedAceIndex, declaredSuit: chosenSuit });
                document.getElementById('ace-modal').style.display = 'none';
                selectedAceIndex = null;
            });
        }

        function cancelAce() {
            selectedAceIndex = null;
            document.getElementById('ace-modal').style.display = 'none';
        }

        function executeAction(callback) {
            actionLocked = true;
            lastClick = Date.now();
            callback();
        }

        /**
         * ANIMATIONS (THROW & DRAW)
         */
        function animateThrow(elem) {
            const clone = elem.cloneNode(true);
            clone.className = 'flying-card card-base';
            const rect = elem.getBoundingClientRect();
            
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            document.body.appendChild(clone);

            const pile = document.getElementById('pile-container').getBoundingClientRect();
            
            requestAnimationFrame(() => {
                clone.style.left = (pile.left + 5) + 'px';
                clone.style.top = (pile.top + 5) + 'px';
                clone.style.transform = `rotate(${Math.random() * 40 - 20}deg) scale(0.9)`;
                clone.style.opacity = "0.6";
            });
            
            setTimeout(() => clone.remove(), 450);
        }

        function handleDrawClick() {
            if(actionLocked) return;
            const pile = document.getElementById('draw-pile').getBoundingClientRect();
            const hand = document.getElementById('my-hand-container').getBoundingClientRect();
            
            const clone = document.createElement('div');
            clone.className = 'flying-card';
            clone.style.width = '100px';
            clone.style.height = '145px';
            clone.style.background = '#8e2424';
            clone.style.border = '3px solid white';
            clone.style.borderRadius = '10px';
            clone.style.left = pile.left + 'px';
            clone.style.top = pile.top + 'px';
            document.body.appendChild(clone);

            requestAnimationFrame(() => {
                clone.style.left = (hand.left + hand.width/2 - 50) + 'px';
                clone.style.top = (hand.top) + 'px';
                clone.style.transform = 'rotate(180deg) scale(0.5)';
                clone.style.opacity = '0';
            });

            setTimeout(() => {
                clone.remove();
                socket.emit('drawCard');
            }, 400);
        }

        /**
         * DISCARD PILE MANAGEMENT
         */
        function updatePile(card) {
            const container = document.getElementById('pile-container');
            if(!container) return;
            
            const cardId = card.value + card.suit;
            if (container.lastElementChild?.getAttribute('data-id') === cardId) return;

            const div = document.createElement('div');
            div.setAttribute('data-id', cardId);
            const isRed = (card.suit === '♥' || card.suit === '♦');
            div.className = `card-base pile-card ${isRed ? 'red' : ''}`;
            
            const rotation = Math.random() * 24 - 12;
            const offsetX = Math.random() * 10 - 5;
            const offsetY = Math.random() * 10 - 5;
            
            div.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${rotation}deg)`;
            div.innerHTML = `
                <div class="card-corner">${card.value}<div>${card.suit}</div></div>
                <div class="card-center">${card.suit}</div>`;
            
            container.appendChild(div);
            
            // Διατήρηση μόνο των τελευταίων 8 φύλλων στο DOM για απόδοση
            if (container.children.length > 8) {
                container.removeChild(container.firstChild);
            }
        }

        /**
         * PLAYER DISTRIBUTION & HUD
         */
        function distributePlayers(players, currentId) {
            const slots = [
                document.getElementById('slot-left'), 
                document.getElementById('slot-top'), 
                document.getElementById('slot-right')
            ];
            slots.forEach(s => s.innerHTML = '');
            
            let slotIdx = 0;
            players.forEach(p => {
                if(p.id === myId) {
                    const myInfo = document.getElementById('my-info-container');
                    myInfo.innerHTML = `
                        <div class="panel player-info ${p.id === currentId ? 'active' : ''}">
                            <div class="player-name">🌟 ${p.name}</div>
                            <div style="font-size:14px; color:var(--gold)">Σκορ: ${p.totalScore}</div>
                        </div>`;
                } else if(slotIdx < 3) {
                    const container = slots[slotIdx];
                    const isActive = p.id === currentId;
                    
                    container.innerHTML = `
                        <div class="panel player-info ${isActive ? 'active' : ''}" style="opacity: ${p.connected ? 1 : 0.4}">
                            <div class="player-name">${p.name} ${p.connected ? '' : '(ΑΠΟΣ.)'}</div>
                            <div style="font-size:12px; color:var(--gold)">Πόντοι: ${p.totalScore}</div>
                        </div>
                        <div class="card-count-box">🎴 ${p.handCount} φύλλα</div>`;
                    slotIdx++;
                }
            });
        }

        /**
         * REVEAL HANDS (ROUND END)
         * Χρησιμοποιεί τις κλάσεις .player-cards και .card που ζήτησες.
         */
        socket.on('revealHands', playersData => {
            const others = playersData.filter(p => p.id !== myId);
            const slotIds = ['slot-left', 'slot-top', 'slot-right'];
            
            others.forEach((p, i) => {
                const container = document.getElementById(slotIds[i]);
                if(container) {
                    let cardsHtml = p.hand.map((c, idx) => {
                        const isRed = (c.color === 'red');
                        return `<div class="card" style="color: ${isRed ? '#d00' : 'black'}; z-index: ${idx};">
                                    ${c.value}<div style="font-size:10px;">${c.suit}</div>
                                </div>`;
                    }).join('');
                    
                    container.innerHTML = `
                        <div class="panel player-info">
                            <div class="player-name">${p.name}</div>
                            <div style="font-size:13px; color:#4f4;">Σύνολο: ${p.totalScore}</div>
                        </div>
                        <div class="player-cards">${cardsHtml}</div>`;
                }
            });
        });

        // === UTILITIES ===

        function joinGame() {
            const input = document.getElementById('username');
            const name = input.value.trim();
            if(!name) return alert("Παρακαλώ εισάγετε ένα όνομα για να παίξετε.");
            
            const sess = sessionStorage.getItem('mv_session') || 'sess_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('mv_session', sess);
            sessionStorage.setItem('mv_username', name);
            socket.emit('joinGame', { username: name, sessionId: sess });
        }

        function startGameRequest() {
            socket.emit('startGameRequest');
        }

        socket.on('playerCountUpdate', count => {
            const area = document.getElementById('waiting-area');
            const login = document.getElementById('login-area');
            const msg = document.getElementById('waiting-msg');
            const btn = document.getElementById('start-btn');
            
            login.style.display = 'none';
            area.style.display = 'block';
            msg.innerText = `Συνδεδεμένοι: ${count} παίκτες`;
            btn.style.display = (count >= 2) ? 'inline-block' : 'none';
        });

        socket.on('gameReady', () => {
            document.getElementById('start-screen').style.display = 'none';
        });

        socket.on('notification', m => {
            msgQueue.push(m);
            if(!isMsgShowing) showNextMsg();
        });

        socket.on('invalidMove', () => {
            actionLocked = false;
            msgQueue.push("⚠️ Κίνηση μη αποδεκτή!");
            if(!isMsgShowing) showNextMsg();
            
            const hand = document.querySelectorAll('.hand-card');
            hand.forEach(c => c.classList.add('shake'));
            setTimeout(() => hand.forEach(c => c.classList.remove('shake')), 400);
        });

        socket.on('gameOver', msg => {
            document.getElementById('victory-msg').innerText = msg;
            document.getElementById('victory-screen').style.display = 'flex';
        });

        // === CHAT LOGIC ===
        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) {
                socket.emit('chatMessage', input.value.trim());
                input.value = '';
            }
        }

        socket.on('chatUpdate', data => {
            const m = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.style.marginBottom = '5px';
            div.innerHTML = `<b style="color:var(--gold)">${data.name}:</b> ${data.text}`;
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
            
            if(m.children.length > 40) m.removeChild(m.firstChild);
        });

        function forceReconnect() {
            window.location.reload();
        }
    </script>
</body>
</html>
