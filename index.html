<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        :root {
            --gold: #d4af37;
            --panel-bg: rgba(0, 0, 0, 0.9);
            --felt-green: radial-gradient(circle at center, #0b6b38 0%, #05351c 80%);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            max-height: 1000000px;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-wrapper {
            width: 1280px;
            height: 720px;
            background: var(--felt-green);
            position: relative;
            display: grid;
            grid-template-areas:
                ". top ."
                "left center right"
                ". bottom .";
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 150px 1fr 280px;
            box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.9);
            border: 12px solid #2b1d12;
            border-radius: 50px;
            transform-origin: center center;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .panel {
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
            z-index: 10;
            padding: 12px;
        }

        .player-slot {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 100px;
        }

        #slot-top {
            grid-area: top;
            align-self: start;
            justify-self: center;
            width: 100%;
            padding-top: 20px;
        }

        #slot-left {
            grid-area: left;
            align-self: center;
            justify-self: center;
            width: 100%;
        }

        #slot-right {
            grid-area: right;
            align-self: center;
            justify-self: center;
            width: 100%;
        }

        #slot-bottom {
            grid-area: bottom;
            align-self: end;
            justify-self: center;
            width: 100%;
            padding-bottom: 12px;
        }

        #game-center {
            grid-area: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        #top-right-ui {
            position: absolute;
            top: 18px;
            right: 20px;
            z-index: 100;
        }

        #turn-indicator {
            padding: 10px 30px;
            background: #1a472a;
            border: 3px solid #4f4;
            border-radius: 20px;
            font-weight: bold;
            font-size: 20px;
            color: white;
            box-shadow: 0 0 16px rgba(0, 0, 0, 0.45);
        }

        #draw-pile {
            width: 120px;
            height: 165px;
            border-radius: 14px;
            background:
                linear-gradient(135deg, #8e2424 0%, #5f1111 100%);
            border: 4px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #draw-pile:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 14px 30px rgba(0,0,0,0.55);
        }

        #deck-count {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        #pile-container {
            width: 130px;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pile-card {
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .player-info {
            min-width: 180px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .player-info.active {
            transform: scale(1.04);
            border-color: #7CFF7C;
            box-shadow: 0 0 16px rgba(124, 255, 124, 0.35);
        }

        .player-name {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #my-info-container {
            margin-bottom: 12px;
        }

        .card-base {
            width: 110px;
            height: 160px;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
            position: relative;
            color: black;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            will-change: transform;
        }

        .card-count-frame {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--gold);
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 15px;
            font-weight: bold;
            color: var(--gold);
            margin-top: 8px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(5px);
            display: inline-block;
        }

        .player-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            position: relative;
            margin-top: 10px;
            max-width: 240px;
        }

        .player-cards .card {
            width: 50px;
            height: 70px;
            margin-left: -20px;
            z-index: 1;
            background: white;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            color: black;
        }

        .player-cards .card:first-child {
            margin-left: 0;
        }

        #msg-overlay {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25000;
            font-size: 32px;
            color: var(--gold);
            font-weight: bold;
            text-shadow: 3px 3px 10px black;
            text-align: center;
            width: 700px;
        }

        #ace-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 50000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #ace-content {
            background: #111;
            padding: 50px;
            border-radius: 30px;
            border: 4px solid var(--gold);
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .suit-btn {
            width: 100px;
            height: 100px;
            font-size: 60px;
            background: white;
            border: 4px solid var(--gold);
            border-radius: 20px;
            margin: 15px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .suit-btn:hover {
            transform: scale(1.08);
        }

        #my-hand-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            overflow-y: auto;
            max-height: 250px;
        }

        .hand-card {
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .hand-card:hover {
            transform: translateY(-40px) scale(1.1);
            z-index: 1000 !important;
        }

        .red {
            color: #d00 !important;
        }

        .card-corner {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-corner.bottom {
            top: auto;
            bottom: 8px;
            left: auto;
            right: 8px;
            transform: rotate(180deg);
        }

        .card-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 75px;
        }

        .flying-card {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 15px 15px 40px rgba(0,0,0,0.6);
        }

        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 40000;
            background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-btn {
            background: linear-gradient(to bottom, #d4af37, #aa8a2e);
            border: none;
            border-radius: 12px;
            color: black;
            padding: 18px 45px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #7a601a;
            transition: transform 0.1s ease, opacity 0.15s ease;
        }

        .game-btn:hover {
            transform: translateY(-2px);
        }

        .game-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a601a;
        }

        .game-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 6px 0 #7a601a;
        }

        @keyframes popMsg {
            0% {
                opacity: 0;
                transform: translate(-50%, -55%) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .shake {
            animation: shakeAnim 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:80px; margin-bottom:20px;">Μαύρος Βαλές ♠️</h1>
        <div id="login-area" style="display:flex; flex-direction:column; align-items:center;">
            <input
                type="text"
                id="username"
                style="background:transparent; border:none; border-bottom:4px solid var(--gold); color:white; font-size:35px; text-align:center; padding:10px; margin-bottom:40px; outline:none; width:350px;"
                placeholder="Το όνομά σου..."
                maxlength="15"
            />
            <button class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ</button>
        </div>
        <div id="waiting-area" style="display:none; text-align:center;">
            <p id="waiting-msg" style="color:white; font-size:28px; margin-bottom:30px;">Σύνδεση...</p>
            <button id="start-btn" class="game-btn" onclick="startGameRequest()" style="display:none;">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="msg-overlay"></div>

    <div id="game-wrapper">
        <div id="ace-modal">
            <div id="ace-content">
                <h2 style="color:var(--gold); font-size: 40px; margin-bottom:30px;">Διάλεξε Χρώμα</h2>
                <button class="suit-btn" style="color:red;" onclick="confirmAce('♥')">♥</button>
                <button class="suit-btn" style="color:red;" onclick="confirmAce('♦')">♦</button>
                <button class="suit-btn" style="color:black;" onclick="confirmAce('♣')">♣</button>
                <button class="suit-btn" style="color:black;" onclick="confirmAce('♠')">♠</button>
                <br />
                <button class="game-btn" style="margin-top:40px; font-size:18px; background:#444; color:white; box-shadow:none;" onclick="cancelAce()">ΑΚΥΡΩΣΗ</button>
            </div>
        </div>

        <div id="top-right-ui">
            <div id="turn-indicator">ΠΕΡΙΜΕΝΕ...</div>
        </div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>

        <div id="game-center">
            <div id="draw-pile" onclick="handleDrawClick()">
                <div style="color:white; font-weight:bold;">ΤΡΑΒΑ</div>
                <div id="deck-count">--</div>
            </div>

            <div id="pile-container"></div>

            <button id="pass-btn" class="game-btn" onclick="handlePass()">ΠΑΣΟ</button>
        </div>

        <div id="slot-right" class="player-slot"></div>

        <div id="slot-bottom" class="player-slot">
            <div id="my-info-container"></div>
            <div id="my-hand-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const SPECIAL_CARDS = {
            ACE: "A",
            TWO: "2",
            THREE: "3",
            SEVEN: "7",
            EIGHT: "8",
            NINE: "9",
            BLACK_JACK: "J"
        };

        const CLICK_DELAY = 450;

        const socket = io();

        let myId = null;
        let lastClick = 0;
        let actionLocked = false;
        let gameScale = 1;
        let selectedAceIndex = null;
        let msgQueue = [];
        let isMsgShowing = false;
        let currentIsMyTurn = false;

        function resizeGame() {
            const wrapper = document.getElementById("game-wrapper");
            if (!wrapper) return;

            const ww = window.innerWidth;
            const wh = window.innerHeight;
            gameScale = Math.min(ww / 1280, wh / 720);
            wrapper.style.transform = `scale(${gameScale})`;
        }

        window.addEventListener("resize", resizeGame);
        resizeGame();

        function showNextMsg() {
            const overlay = document.getElementById("msg-overlay");

            if (!overlay || msgQueue.length === 0) {
                isMsgShowing = false;
                if (overlay) overlay.style.display = "none";
                return;
            }

            isMsgShowing = true;
            overlay.innerText = msgQueue.shift();
            overlay.style.display = "block";
            overlay.style.animation = "none";
            overlay.offsetHeight;
            overlay.style.animation = "popMsg 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards";

            setTimeout(() => {
                overlay.style.display = "none";
                setTimeout(showNextMsg, 250);
            }, 2200);
        }

        function queueMessage(message) {
            msgQueue.push(message);
            if (!isMsgShowing) showNextMsg();
        }

        function updatePassButton(isMyTurn) {
            const passBtn = document.getElementById("pass-btn");
            if (!passBtn) return;
            passBtn.disabled = !isMyTurn || actionLocked;
        }

        function updatePile(card) {
            const container = document.getElementById("pile-container");
            if (!container || !card) return;

            const cardId = `${card.value}${card.suit}`;
            if (container.lastElementChild?.dataset.id === cardId) return;

            const div = document.createElement("div");
            div.dataset.id = cardId;

            const isRed = card.suit === "♥" || card.suit === "♦";
            div.className = `card-base pile-card ${isRed ? "red" : ""}`;

            const rotation = Math.random() * 30 - 15;
            const offX = Math.random() * 12 - 6;
            const offY = Math.random() * 12 - 6;

            div.style.transform = `translate(${offX}px, ${offY}px) rotate(${rotation}deg)`;
            div.innerHTML = `
                <div class="card-corner">${card.value}<div>${card.suit}</div></div>
                <div class="card-center">${card.suit}</div>
                <div class="card-corner bottom">${card.value}<div>${card.suit}</div></div>
            `;

            container.appendChild(div);

            while (container.children.length > 10) {
                container.removeChild(container.firstChild);
            }
        }

        function animateThrow(elem) {
            if (!elem) return;

            const clone = elem.cloneNode(true);
            const rect = elem.getBoundingClientRect();
            const pileRect = document.getElementById("pile-container").getBoundingClientRect();

            clone.classList.add("flying-card");
            clone.style.left = rect.left + "px";
            clone.style.top = rect.top + "px";
            clone.style.width = rect.width + "px";
            clone.style.height = rect.height + "px";
            clone.style.margin = "0";
            clone.style.position = "fixed";

            document.body.appendChild(clone);

            requestAnimationFrame(() => {
                clone.style.left = pileRect.left + 10 + "px";
                clone.style.top = pileRect.top + 10 + "px";
                clone.style.transform = `rotate(${Math.random() * 40 - 20}deg) scale(0.95)`;
                clone.style.opacity = "0.7";
            });

            setTimeout(() => clone.remove(), 500);
        }

        function handleDrawClick() {
            if (actionLocked || !currentIsMyTurn) return;

            actionLocked = true;
            updatePassButton(currentIsMyTurn);

            const drawPile = document.getElementById("draw-pile").getBoundingClientRect();
            const hand = document.getElementById("my-hand-container").getBoundingClientRect();

            const clone = document.createElement("div");
            clone.className = "flying-card";
            clone.style.width = "110px";
            clone.style.height = "160px";
            clone.style.background = "#8e2424";
            clone.style.border = "4px solid white";
            clone.style.borderRadius = "12px";
            clone.style.left = drawPile.left + "px";
            clone.style.top = drawPile.top + "px";

            document.body.appendChild(clone);

            requestAnimationFrame(() => {
                clone.style.left = hand.left + hand.width / 2 - 55 + "px";
                clone.style.top = hand.top + "px";
                clone.style.transform = "rotate(180deg) scale(0.6)";
                clone.style.opacity = "0";
            });

            setTimeout(() => {
                clone.remove();
                socket.emit("drawCard");
            }, 450);
        }

        function renderHand(hand, isMyTurn) {
            const container = document.getElementById("my-hand-container");
            if (!container) return;

            container.innerHTML = "";
            container.style.opacity = isMyTurn ? "1" : "0.7";
            container.style.pointerEvents = isMyTurn ? "auto" : "none";

            hand.forEach((c, i) => {
                const div = document.createElement("div");
                const isRed = c.suit === "♥" || c.suit === "♦";
                div.className = `card-base hand-card card-${i} ${isRed ? "red" : ""}`;
                div.style.zIndex = i;

                div.innerHTML = `
                    <div class="card-corner">${c.value}<div>${c.suit}</div></div>
                    <div class="card-center">${c.suit}</div>
                    <div class="card-corner bottom">${c.value}<div>${c.suit}</div></div>
                `;

                div.onclick = () => {
                    if (!currentIsMyTurn || actionLocked) return;
                    if (Date.now() - lastClick < CLICK_DELAY) return;

                    if (c.value === SPECIAL_CARDS.ACE) {
                        selectedAceIndex = i;
                        document.getElementById("ace-modal").style.display = "flex";
                        return;
                    }

                    animateThrow(div);
                    lastClick = Date.now();
                    actionLocked = true;
                    updatePassButton(currentIsMyTurn);
                    socket.emit("playCard", { index: i });
                };

                container.appendChild(div);
            });
        }

        function distributePlayers(players, currentId) {
            const slots = [
                document.getElementById("slot-left"),
                document.getElementById("slot-top"),
                document.getElementById("slot-right")
            ];

            slots.forEach(slot => slot.innerHTML = "");

            let slotIdx = 0;

            players.forEach(player => {
                if (player.id === myId) {
                    document.getElementById("my-info-container").innerHTML = `
                        <div class="panel player-info ${player.id === currentId ? "active" : ""}">
                            <div class="player-name">🌟 ${player.name}</div>
                            <div style="font-size:14px; color:var(--gold)">Σκορ: ${player.totalScore ?? 0}</div>
                        </div>
                    `;
                } else if (slotIdx < 3) {
                    slots[slotIdx].innerHTML = `
                        <div class="panel player-info ${player.id === currentId ? "active" : ""}" style="opacity: ${player.connected ? 1 : 0.4}">
                            <div class="player-name">${player.name}</div>
                            <div style="font-size:12px; color:var(--gold)">Πόντοι: ${player.totalScore ?? 0}</div>
                        </div>
                        <div class="card-count-frame">🎴 ${player.handCount ?? 0} φύλλα</div>
                    `;
                    slotIdx++;
                }
            });
        }

        function confirmAce(suit) {
            if (selectedAceIndex === null || selectedAceIndex === undefined) return;

            const el = document.querySelector(`.card-${selectedAceIndex}`);
            if (el) animateThrow(el);

            socket.emit("playCard", {
                index: selectedAceIndex,
                declaredSuit: suit
            });

            document.getElementById("ace-modal").style.display = "none";
            lastClick = Date.now();
            actionLocked = true;
            updatePassButton(currentIsMyTurn);
            selectedAceIndex = null;
        }

        function cancelAce() {
            document.getElementById("ace-modal").style.display = "none";
            selectedAceIndex = null;
        }

        function joinGame() {
            const input = document.getElementById("username");
            const name = input.value.trim();

            if (!name) {
                alert("Βάλε όνομα!");
                return;
            }

            const sess = sessionStorage.getItem("mv_session") || ("sess_" + Math.random().toString(36).slice(2, 11));
            sessionStorage.setItem("mv_session", sess);
            sessionStorage.setItem("mv_username", name);

            socket.emit("joinGame", {
                username: name,
                sessionId: sess
            });
        }

        function startGameRequest() {
            socket.emit("startGameRequest");
        }

        function handlePass() {
            if (!currentIsMyTurn || actionLocked) return;
            actionLocked = true;
            updatePassButton(currentIsMyTurn);
            socket.emit("passTurn");
        }

        socket.on("connect", () => {
            myId = socket.id;

            const name = sessionStorage.getItem("mv_username");
            const sess = sessionStorage.getItem("mv_session");

            if (name && sess) {
                socket.emit("joinGame", {
                    username: name,
                    sessionId: sess
                });
            }
        });

        socket.on("updateUI", data => {
            actionLocked = false;
            currentIsMyTurn = !!data.isMyTurn;

            const deckCountEl = document.getElementById("deck-count");
            if (deckCountEl) deckCountEl.innerText = data.deckCount ?? "--";

            const ind = document.getElementById("turn-indicator");
            if (ind) {
                if (data.isMyTurn) {
                    ind.innerText = data.penalty > 0 ? `⚠️ ΦΑΕ ${data.penalty} ΦΥΛΛΑ!` : "ΔΙΚΗ ΣΟΥ ΣΕΙΡΑ";
                    ind.style.borderColor = "#4f4";
                    ind.style.background = "#1a472a";
                } else {
                    ind.innerText = `ΠΑΙΖΕΙ: ${data.currentPlayerName ?? "..."}`;
                    ind.style.borderColor = "#ff4444";
                    ind.style.background = "#471a1a";
                }
            }

            updatePassButton(currentIsMyTurn);
            renderHand(data.myHand || [], currentIsMyTurn);

            if (data.topCard) updatePile(data.topCard);
            distributePlayers(data.players || [], data.currentPlayerId);
        });

        socket.on("playerCountUpdate", count => {
            document.getElementById("waiting-area").style.display = "block";
            document.getElementById("login-area").style.display = "none";
            document.getElementById("waiting-msg").innerText = `Συνδεδεμένοι: ${count} παίκτες`;
            document.getElementById("start-btn").style.display = count >= 2 ? "inline-block" : "none";
        });

        socket.on("gameReady", () => {
            document.getElementById("start-screen").style.display = "none";
        });

        socket.on("notification", message => {
            queueMessage(message);
        });

        socket.on("invalidMove", () => {
            actionLocked = false;
            updatePassButton(currentIsMyTurn);
            queueMessage("⚠️ Άκυρη κίνηση!");

            document.querySelectorAll(".hand-card").forEach(card => {
                card.classList.add("shake");
                setTimeout(() => card.classList.remove("shake"), 400);
            });
        });

        socket.on("revealHands", playersData => {
            const others = playersData.filter(player => player.id !== myId);
            const slotIds = ["slot-left", "slot-top", "slot-right"];

            others.forEach((player, index) => {
                const container = document.getElementById(slotIds[index]);
                if (!container) return;

                const cardsHtml = (player.hand || [])
                    .map((card, idx) => `
                        <div class="card" style="color:${card.color === "red" ? "#d00" : "black"}; z-index:${idx};">
                            ${card.value}
                            <div>${card.suit}</div>
                        </div>
                    `)
                    .join("");

                container.innerHTML = `
                    <div class="panel player-info">
                        <div class="player-name">${player.name}</div>
                        <div style="font-size:13px; color:#4f4;">Σκορ: ${player.totalScore ?? 0}</div>
                    </div>
                    <div class="player-cards">${cardsHtml}</div>
                `;
            });
        });

        socket.on("gameOver", message => {
            alert(message);
        });

        document.getElementById("username").addEventListener("keydown", event => {
            if (event.key === "Enter") {
                joinGame();
            }
        });
    </script>
</body>
</html>
