<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        /* === CSS CONSTANTS & RESET === */
        :root { 
            --gold: #d4af37; 
            --panel-bg: rgba(0, 0, 0, 0.85);
            --felt-green: radial-gradient(circle at center, #0b6b38 0%, #05351c 80%);
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* ΚΛΕΙΔΩΜΑ ΓΡΑΜΜΑΤΩΝ ΓΙΑ ΚΙΝΗΤΑ - FIX ΓΙΑ FONT BOOSTING */
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            max-height: 1000000px;
        }

        body { 
            background: #000;
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === 3D VIEWPORT === */
        #game-wrapper {
            width: 1280px; 
            height: 720px;
            background: var(--felt-green);
            position: relative;
            display: grid;
            grid-template-areas: 
                ". top ."
                "left center right"
                ". bottom .";
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 150px 1fr 280px; /* Χώρος για να χωράνε οι στοίβες στο χέρι */
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            border: 15px solid #2b1d12;
            border-radius: 40px;
            transform-origin: center center;
            flex-shrink: 0;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        #game-wrapper::before {
            content: "";
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            box-shadow: 0 0 200px rgba(0,0,0,.9) inset;
            pointer-events: none;
            z-index: 1; 
        }

        /* === UI COMPONENTS === */
        .panel {
            background: var(--panel-bg); 
            border: 2px solid var(--gold); 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            padding: 10px;
            color: white;
            box-sizing: border-box;
        }
        
        .card-base {
            width: 110px; 
            height: 160px; 
            background: white; 
            border-radius: 10px; 
            border: 1px solid #ccc; 
            position: relative;
            color: black;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            will-change: transform;
        }

        /* === REVEALED HANDS FIXES === */
        .player-cards {
            display: flex;
            flex-wrap: wrap; /* επιτρέπει νέες γραμμές όταν δημιουργούνται στοίβες */
            gap: 5px; /* απόσταση μεταξύ των φύλλων */
            justify-content: center;
            position: relative;
            padding-bottom: 10px; /* αφήνει χώρο κάτω από το όνομα του παίκτη */
            max-width: 220px;
        }

        .player-cards .card {
            width: 50px; /* μέγεθος φύλλου */
            height: 70px;
            margin-left: -20px; /* overlap αν έχουμε πολλές κάρτες */
            z-index: 1;
            background: white;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 2px 2px 5px black;
            position: relative;
            color: black;
        }

        .player-cards .card:first-child {
            margin-left: 0;
        }

        .player-cards .stacked .card {
            margin-left: -35px; /* μεγαλύτερο overlap για στοίβες */
        }

        /* === NOTIFICATIONS & OVERLAYS === */
        #msg-overlay { 
            display: none; 
            position: fixed; 
            top: 30%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 20000; 
            font-size: 30px; 
            color: var(--gold); 
            font-weight: bold; 
            text-shadow: 2px 2px 10px black; 
            pointer-events: none; 
            text-align: center; 
            width: 600px;
            white-space: pre-line; 
            line-height: 1.3;
        }

        @keyframes popMsg {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #victory-screen {
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 30000;
            background: rgba(0,0,0,0.92); 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px;
        }
        
        /* === CHAT & UI === */
        #chat-toggle { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            width: 60px; 
            height: 60px; 
            background: var(--gold); 
            border-radius: 50%; 
            border: none; 
            font-size: 30px; 
            cursor: pointer; 
            z-index: 7000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        #chat-box { 
            position: absolute; 
            bottom: 90px; 
            left: 20px; 
            width: 300px; 
            height: 350px; 
            display: none; 
            flex-direction: column; 
            z-index: 7000; 
        }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            font-size: 14px; 
            color: #eee; 
            text-align: left; 
        }
        
        #chat-input-area { 
            display: flex; 
            padding: 10px; 
            border-top: 1px solid #444; 
        }
        
        #chat-input { 
            flex: 1; 
            background: #222; 
            border: 1px solid var(--gold); 
            color: white; 
            padding: 8px; 
            border-radius: 5px; 
            outline: none; 
        }

        #reconnect-btn { 
            position: absolute; 
            bottom: 20px; 
            left: 90px; 
            height: 60px; 
            padding: 0 20px; 
            background: #b30000; 
            border-radius: 30px; 
            border: 2px solid var(--gold); 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            z-index: 7000; 
            color: white; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }

        /* === LOGIN SCREEN === */
        #start-screen { 
            position: fixed; 
            inset: 0; 
            z-index: 40000; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        .name-input {
            background: transparent; 
            border: none; 
            border-bottom: 3px solid var(--gold);
            color: white; 
            font-size: 30px; 
            text-align: center; 
            padding: 10px;
            margin-bottom: 30px; 
            outline: none; 
            width: 300px;
        }

        .game-btn { 
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a); 
            border: 2px solid #666; 
            border-radius: 10px; 
            color: white; 
            padding: 15px 35px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 5px 0 #000;
        }
        
        .game-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }

        /* === PLAYER POSITIONS === */
        .player-slot { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            z-index: 10; 
        }
        
        #slot-top { grid-area: top; }
        #slot-left { grid-area: left; }
        #slot-right { grid-area: right; }
        #slot-bottom { 
            grid-area: bottom; 
            align-self: center; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .player-info { 
            position: relative; 
            padding: 5px 15px; 
            text-align: center; 
            min-width: 140px; 
            margin-bottom: 5px; 
            transition: 0.3s; 
        }
        
        .player-info.active { 
            border-color: #4f4; 
            box-shadow: 0 0 15px #4f4; 
            background: rgba(0, 40, 0, 0.8); 
        }
        
        .card-count-box { 
            background: rgba(0, 0, 0, 0.7); 
            border: 1px solid var(--gold); 
            border-radius: 6px; 
            padding: 4px 10px; 
            font-size: 13px; 
            color: white; 
            margin-top: 5px; 
            font-weight: bold; 
        }

        /* === MY HAND LAYOUT (WRAP ΓΙΑ ΠΟΛΛΑ ΦΥΛΛΑ) === */
        #my-hand-container { 
            width: 100%; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            padding: 10px; 
            overflow-y: auto; 
            max-height: 240px;
            transition: opacity 0.3s;
        }
        
        .not-my-turn .hand-card { pointer-events: none; opacity: 0.9; }
        
        .hand-card { 
            cursor: pointer; 
            transition: transform 0.2s, margin 0.2s; 
            position: relative; 
        }
        
        @media (hover: hover) and (pointer: fine) {
            .hand-card:hover { 
                transform: translateY(-40px) scale(1.1); 
                z-index: 9999 !important; /* Φέρνει το φύλλο ΠΑΝΤΑ μπροστά */
            }
        }

        /* Classes για το Layout των δικών μας φύλλων */
        .hand-normal { flex-wrap: nowrap; }
        .hand-compact { height: 240px !important; }
        .hand-compact .hand-card { width: 77px; height: 112px; margin-bottom: -40px; }
        
        /* Διόρθωση των συμβόλων όταν τα φύλλα γίνονται στοίβες (μικραίνουν) */
        .hand-compact .card-corner { font-size: 16px; top: 4px; left: 4px; }
        .hand-compact .card-corner.bottom { top: auto; bottom: 4px; left: auto; right: 4px; transform: rotate(180deg); }
        .hand-compact .card-center { font-size: 40px; }

        /* === HUD & TURN INDICATORS === */
        #top-right-ui { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        
        #turn-indicator { 
            padding: 8px 25px; 
            background: #1a472a; 
            border: 3px solid #4f4; 
            border-radius: 15px; 
            font-weight: bold; 
            color: white; 
        }
        
        #turn-timer { 
            position: relative; 
            width: 52px; 
            height: 52px; 
            display: none; 
        }
        
        .timer-bg { stroke: #444; fill: rgba(0,0,0,0.5); }
        .timer-bar { stroke: #00ff9c; fill: none; stroke-dasharray: 139; stroke-dashoffset: 0; transform: rotate(-90deg); transform-origin: center; }
        #timer-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: white; text-shadow: 1px 1px 3px black; }

        /* === GAME CENTER (ΣΤΟΙΒΑ ΚΑΙ ΤΡΑΠΟΥΛΑ) === */
        #game-center { 
            grid-area: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 40px; 
        }
        
        #draw-pile { 
            width: 100px; 
            height: 145px; 
            background: linear-gradient(135deg, #8e2424, #4d0000); 
            border: 3px solid white; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); 
            transition: transform 0.2s ease;
            transform-style: preserve-3d;
            transform: translateZ(20px);
        }
        
        #draw-pile::before, #draw-pile::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 10px; border: 3px solid white; z-index: -1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #draw-pile::before { transform: translate(4px, 4px) translateZ(-1px); }
        #draw-pile::after { transform: translate(8px, 8px) translateZ(-2px); }
        #draw-pile:hover { transform: translateZ(20px) scale(1.08); }
        
        #deck-count { font-size: 35px; font-weight: bold; color: var(--gold); margin-top: 5px;}

        #pile-container { 
            width: 110px; 
            height: 160px; 
            position: relative; 
            transform: translateZ(30px); 
            transform-style: preserve-3d;
        }
        
        .pile-card { 
            position: absolute; 
            top: 0; left: 0; 
            box-shadow: 3px 3px 8px rgba(0,0,0,0.3); 
            padding: 8px; 
            will-change: transform; 
        }

        .red { color: #d00 !important; }
        .card-corner { position: absolute; top: 5px; left: 5px; font-size: 24px; font-weight: bold; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card-corner.bottom { top: auto; bottom: 5px; left: auto; right: 5px; transform: rotate(180deg); }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; }

        /* === ACE MODAL === */
        #ace-modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 50000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        #ace-content { 
            background: var(--panel-bg); 
            padding: 40px; 
            border-radius: 20px; 
            border: 3px solid var(--gold); 
            text-align: center; 
        }
        
        .suit-btn { 
            width: 90px; 
            height: 90px; 
            font-size: 55px; 
            background: white; 
            border: 4px solid var(--gold); 
            border-radius: 15px; 
            margin: 15px; 
            cursor: pointer; 
        }

        #scoreboard { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            padding: 15px; 
            z-index: 1000; 
            font-size: 16px; 
            display: none; 
            color: white; 
            cursor: pointer; 
            max-height: 500px; 
            overflow-y: auto; 
        }
        
        table { border-collapse: collapse; width: 100%; color: white; }
        th, td { border: 1px solid var(--gold); padding: 10px; text-align: center; }

        #active-suit-display { 
            position: absolute; 
            top: 35%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 120px; 
            z-index: 100; 
            text-shadow: 0 0 20px black; 
            display: none; 
            pointer-events: none; 
            opacity: 0.6; 
        }

        #error-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100000; 
            background: rgba(150, 0, 0, 0.95); 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center; 
        }
        
        .flying-card { 
            position: fixed; 
            z-index: 99999; 
            pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5); 
        }

        .shake { animation: shake 0.2s; border-color: red !important; }
        @keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-5px);} 75% {transform:translateX(5px);} }
    </style>
</head>
<body>

    <div id="error-overlay">
        <h2>ΠΡΟΕΚΥΨΕ ΣΦΑΛΜΑ!</h2>
        <p id="error-text" style="font-family: monospace; padding: 20px;"></p>
        <button class="game-btn" onclick="window.location.reload()">ΕΠΑΝΑΦΟΡΤΩΣΗ ΣΕΛΙΔΑΣ</button>
    </div>

    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:80px; margin-bottom:10px;">Μαύρος Βαλές ♠️</h1>
        <div id="login-area" style="display:flex; flex-direction:column; align-items:center;">
            <input type="text" id="username" class="name-input" placeholder="Όνομα..." maxlength="15">
            <button class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ</button>
        </div>
        <div id="waiting-area" style="display:none; text-align:center;">
            <p id="waiting-msg" style="color:white; font-size:24px; margin-bottom:20px;">Σύνδεση...</p>
            <button id="start-btn" class="game-btn" onclick="startGameRequest()" style="display:none;">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="msg-overlay"></div>

    <div id="victory-screen">
        <h1 id="victory-msg" style="color: white; font-size: 50px;">🏆</h1>
        <button class="game-btn" style="border: 3px solid #4f4; color: #4f4;" onclick="location.reload()">ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
    </div>

    <div id="game-wrapper">
        
        <div id="ace-modal">
            <div id="ace-content">
                <h2 style="color:var(--gold); font-size: 40px; margin-bottom:20px;">Διάλεξε Χρώμα</h2>
                <div>
                    <button class="suit-btn" style="color:red;" onclick="confirmAce('♥')">♥</button>
                    <button class="suit-btn" style="color:red;" onclick="confirmAce('♦')">♦</button>
                    <button class="suit-btn" style="color:black;" onclick="confirmAce('♣')">♣</button>
                    <button class="suit-btn" style="color:black;" onclick="confirmAce('♠')">♠</button>
                </div>
                <button class="game-btn" style="margin-top:20px; font-size:16px;" onclick="cancelAce()">ΑΚΥΡΩΣΗ</button>
            </div>
        </div>

        <div id="scoreboard" class="panel" onclick="this.style.display='none'">
            <table id="score-table"></table>
        </div>

        <button id="chat-toggle" onclick="toggleChat()">💬</button>
        <button id="reconnect-btn" onclick="forceReconnect()">🔄 Reconnect</button>
        
        <div id="chat-box" class="panel">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Πες κάτι..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>

        <div id="top-right-ui">
            <div id="turn-timer">
                <svg width="52" height="52" style="position: absolute; top: 0; left: 0;">
                    <circle r="22" cx="26" cy="26" class="timer-bg" stroke-width="4"/>
                    <circle r="22" cx="26" cy="26" class="timer-bar" stroke-width="4"/>
                </svg>
                <div id="timer-text">60</div>
            </div>
            <div id="turn-indicator">ΠΕΡΙΜΕΝΕ...</div>
        </div>

        <div id="active-suit-display"></div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>

        <div id="game-center">
            <div id="draw-pile" onclick="triggerDrawAnimation()">
                <div style="color:white; font-weight:bold;">ΤΡΑΒΑ</div>
                <div id="deck-count">--</div>
            </div>
            <div id="pile-container">
                </div>
            <button class="game-btn" onclick="socket.emit('passTurn')">ΠΑΣΟ</button>
        </div>

        <div id="slot-right" class="player-slot"></div>
        
        <div id="slot-bottom" class="player-slot">
            <div id="my-info-container"></div>
            <div id="my-hand-container"></div> 
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // === GLOBAL ERROR CATCHER ===
        window.onerror = function(msg, url, line) {
            const overlay = document.getElementById('error-overlay');
            const text = document.getElementById('error-text');
            if(overlay && text) {
                overlay.style.display = 'flex';
                text.innerText = `[Σφάλμα]: ${msg}\nΣτη γραμμή: ${line}`;
            }
            return false;
        };

        // === GLOBALS ===
        const socket = io();
        let myId = null;
        let lastClick = 0;
        const CLICK_DELAY = 400; 
        let actionLocked = false;
        let gameScale = 1;
        let selectedAceIndex = null;
        let lastPlayerId = null;
        let timerEnd = 0;
        let animationFrameId = null;
        let fullScoreHistory = [];
        let isScoreboardExpanded = false;
        let msgQueue = [];
        let isMsgShowing = false;

        // === SCALING LOGIC ===
        function resizeGame() {
            const wrapper = document.getElementById('game-wrapper');
            if(!wrapper) return;
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const targetW = 1280;
            const targetH = 720;
            
            gameScale = Math.min(ww / targetW, wh / targetH);
            wrapper.style.transform = `scale(${gameScale})`;
        }
        window.addEventListener('resize', resizeGame);
        resizeGame();

        // === NOTIFICATIONS QUEUE ===
        function showNextMsg() {
            const o = document.getElementById('msg-overlay');
            if(!o) return;
            
            if (msgQueue.length === 0) {
                isMsgShowing = false;
                o.style.display = 'none';
                return;
            }

            isMsgShowing = true;
            o.innerText = msgQueue.shift(); 
            o.style.display = 'block';
            o.style.animation = 'none';
            o.offsetHeight; 
            o.style.animation = 'popMsg 0.4s forwards';
            
            setTimeout(() => {
                o.style.display = 'none';
                setTimeout(showNextMsg, 200); 
            }, 2000); 
        }

        // === TIMER ===
        function startTimer(seconds = 60) {
            const bar = document.querySelector(".timer-bar");
            const text = document.getElementById("timer-text");
            const container = document.getElementById("turn-timer");
            if(!bar || !text || !container) return;

            container.style.display = "block";
            timerEnd = Date.now() + seconds * 1000;

            if(animationFrameId) cancelAnimationFrame(animationFrameId);

            const update = () => {
                const remaining = Math.max(0, timerEnd - Date.now());
                const percent = remaining / (seconds * 1000);
                bar.style.strokeDashoffset = 139 * (1 - percent); 
                text.innerText = Math.ceil(remaining / 1000);

                if(remaining > 0) animationFrameId = requestAnimationFrame(update);
            }
            update();
        }

        // === SOCKET EVENT HANDLERS ===
        function joinGame() {
            const input = document.getElementById('username');
            const name = input.value.trim();
            if(!name) return alert("Βάλε όνομα!");
            
            const sess = sessionStorage.getItem('mv_session') || 'sess_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('mv_session', sess);
            sessionStorage.setItem('mv_username', name);
            socket.emit('joinGame', { username: name, sessionId: sess });
        }

        function startGameRequest() {
            socket.emit('startGameRequest');
        }

        socket.on('connect', () => {
            document.getElementById('reconnect-btn').style.display = 'none';
            myId = socket.id;
            const name = sessionStorage.getItem('mv_username');
            const session = sessionStorage.getItem('mv_session');
            if(name && session && document.getElementById('start-screen').style.display === 'none') {
                socket.emit('joinGame', { username: name, sessionId: session });
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('reconnect-btn').style.display = 'flex';
        });

        socket.on('playerCountUpdate', count => {
            document.getElementById('waiting-area').style.display = 'block';
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('waiting-msg').innerText = `Συνδεδεμένοι παίκτες: ${count}`;
            document.getElementById('start-btn').style.display = count >= 2 ? 'inline-block' : 'none';
        });

        socket.on('gameReady', () => {
            document.getElementById('start-screen').style.display = 'none';
        });

        socket.on('notification', m => {
            msgQueue.push(m);
            if (!isMsgShowing) showNextMsg();
        });

        socket.on('updateUI', data => {
            actionLocked = false;
            window.currentScoreData = data;
            document.getElementById('deck-count').innerText = data.deckCount;
            window.currentTopCard = data.topCard;
            window.currentActiveSuit = data.activeSuit;

            if (data.currentPlayerId && data.currentPlayerId !== lastPlayerId) {
                lastPlayerId = data.currentPlayerId;
                startTimer(60);
            }

            if (data.topCard) {
                const cardId = data.topCard.value + data.topCard.suit;
                if (cardId !== window.lastTopCardIdStr) {
                    addCardToPile(data.topCard);
                    window.lastTopCardIdStr = cardId;
                }
            }

            const suitDisplay = document.getElementById('active-suit-display');
            if (suitDisplay) {
                if (data.activeSuit) {
                    suitDisplay.innerText = data.activeSuit;
                    suitDisplay.style.color = (data.activeSuit === '♥' || data.activeSuit === '♦') ? '#ff4444' : '#222';
                    suitDisplay.style.display = 'block';
                    suitDisplay.style.textShadow = "0 0 10px white, 0 0 20px white";
                } else { suitDisplay.style.display = 'none'; }
            }

            const ind = document.getElementById('turn-indicator');
            const handCont = document.getElementById('my-hand-container');
            if (ind && handCont) {
                if (data.isMyTurn) {
                    ind.innerText = data.penalty > 0 ? `⚠️ ΦΑΕ ${data.penalty}!` : "ΔΙΚΗ ΣΟΥ ΣΕΙΡΑ";
                    ind.style.borderColor = "#4f4"; ind.style.color = "#4f4";
                    handCont.classList.remove('not-my-turn');
                } else {
                    ind.innerText = `ΠΑΙΖΕΙ: ${data.currentPlayerName}`;
                    ind.style.borderColor = "#ff4444"; ind.style.color = "#ffdddd";
                    handCont.classList.add('not-my-turn');
                }
            }

            renderHand(data.myHand);
            distributePlayers(data.players, data.currentPlayerName, data.isMyTurn);
        });

        // === EVENT DELEGATION ΓΙΑ ΤΟ ΧΕΡΙ ΜΑΣ ===
        document.getElementById('my-hand-container').addEventListener('click', function(e) {
            const cardEl = e.target.closest('.hand-card');
            if (!cardEl) return;
            
            const index = parseInt(cardEl.getAttribute('data-index'), 10);
            const value = cardEl.getAttribute('data-value');
            const suit = cardEl.getAttribute('data-suit');
            
            playCardLogic(index, value, suit);
        });

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            if(!container) return;
            
            // Επιλογή Layout: Αν είναι πολλά, μπαίνουν σε 2η σειρά και μικραίνουν ελαφρώς
            container.className = hand.length > 14 ? 'hand-compact' : 'hand-normal';
            
            const frag = document.createDocumentFragment();
            let overlap = (hand.length > 14) ? "-25px" : (hand.length > 8 ? "-55px" : "-40px");

            hand.forEach((c, i) => {
                if(!c) return;
                const div = document.createElement("div");
                const isRed = (c.suit === '♥' || c.suit === '♦');
                div.className = `card-base hand-card card-${i} ${isRed ? 'red' : ''}`;
                
                div.style.marginLeft = i === 0 ? "0px" : overlap;
                div.style.zIndex = i; 
                
                div.setAttribute('data-index', i);
                div.setAttribute('data-value', c.value);
                div.setAttribute('data-suit', c.suit);

                div.innerHTML = `
                    <div class="card-corner">${c.value}<div>${c.suit}</div></div>
                    <div class="card-center">${c.suit}</div>
                    <div class="card-corner bottom">${c.value}<div>${c.suit}</div></div>`;
                
                frag.appendChild(div);
            });

            container.innerHTML = "";
            container.appendChild(frag);
        }

        // === ΛΟΓΙΚΗ ΓΙΑ ΤΟΝ ΑΣΣΟ ΚΑΙ ΤΟ ΠΑΙΞΙΜΟ ===
        function playCardLogic(index, value, suit) {
            const handCont = document.getElementById('my-hand-container');
            if (handCont && handCont.classList.contains('not-my-turn')) return;
            if (actionLocked || Date.now() - lastClick < CLICK_DELAY) return;

            if (value === 'A') {
                const topCard = window.currentTopCard;
                const effectiveSuit = window.currentActiveSuit || (topCard ? topCard.suit : null);
                
                // ΚΑΝΟΝΑΣ: Αν έχει πέσει Άσσος και ρίχνουμε Άσσο του ίδιου χρώματος, παίζεται σαν φύλλο.
                if (topCard && topCard.value === 'A' && suit === effectiveSuit) {
                    executePlayCard(index, null);
                    return;
                }

                // Διαφορετικά, λειτουργεί ως μπαλαντέρ και ρωτάει χρώμα
                selectedAceIndex = index;
                document.getElementById('ace-modal').style.display = 'flex';
                return;
            }

            executePlayCard(index, null);
        }

        function confirmAce(chosenSuit) {
            if (selectedAceIndex === null) return;
            executePlayCard(selectedAceIndex, chosenSuit);
            document.getElementById('ace-modal').style.display = 'none';
            selectedAceIndex = null;
        }

        function cancelAce() {
            selectedAceIndex = null;
            document.getElementById('ace-modal').style.display = 'none';
        }

        function executePlayCard(index, declaredSuit) {
            const cardElement = document.querySelector(`.card-${index}`);
            if (cardElement) animateThrow(cardElement);

            actionLocked = true;
            lastClick = Date.now();
            socket.emit('playCard', { index: index, declaredSuit: declaredSuit });
        }

        // === ΦΥΣΙΚΗ ΣΤΟΙΒΑ ΜΕΧΡΙ 15 ΦΥΛΛΑ ===
        function addCardToPile(c) {
            const container = document.getElementById('pile-container');
            if(!container) return;
            
            const div = document.createElement('div');
            const isRed = (c.suit === '♥' || c.suit === '♦');
            div.className = `card-base pile-card ${isRed ? 'red' : ''}`; 
            
            // Τυχαία ρεαλιστική κλίση (μοίρες και offsets) για φυσικό εφέ
            const x = Math.random() * 16 - 8;
            const y = Math.random() * 16 - 8;
            const r = Math.random() * 26 - 13; 
            
            div.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
            div.innerHTML = `
                <div class="card-corner">${c.value}<div>${c.suit}</div></div>
                <div class="card-center">${c.suit}</div>
                <div class="card-corner bottom">${c.value}<div>${c.suit}</div></div>`;
            
            container.appendChild(div);
            
            // Διατήρηση της στοίβας στα τελευταία 15 φύλλα για απόδοση
            const cards = container.querySelectorAll('.pile-card');
            if (cards.length > 15) {
                cards[0].remove();
            }
        }

        // === ANIMATIONS ===
        function triggerDrawAnimation() {
            const handCont = document.getElementById('my-hand-container');
            if (actionLocked || handCont.classList.contains('not-my-turn')) return;
            
            actionLocked = true;
            lastClick = Date.now();

            const deckEl = document.getElementById('draw-pile');
            const clone = document.createElement('div');
            clone.className = 'flying-card';
            clone.style.width = '77px';
            clone.style.height = '112px';
            clone.style.background = 'linear-gradient(135deg, #a00, #500)';
            clone.style.border = '2px solid white';
            clone.style.borderRadius = '5px';
            
            const rectDeck = deckEl.getBoundingClientRect();
            clone.style.left = rectDeck.left + 'px';
            clone.style.top = rectDeck.top + 'px';
            clone.style.transform = `scale(${gameScale})`;
            document.body.appendChild(clone);

            const rectHand = handCont.getBoundingClientRect();
            requestAnimationFrame(() => {
                clone.style.transition = 'all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
                clone.style.left = (rectHand.left + rectHand.width/2 - 38)+'px';
                clone.style.top = (rectHand.top-20)+'px';
                clone.style.opacity = 0;
                clone.style.transform = `scale(${gameScale}) rotate(180deg)`;
            });

            setTimeout(() => { clone.remove(); socket.emit('drawCard'); }, 300);
        }

        function animateThrow(elem) {
            const clone = elem.cloneNode(true);
            clone.className = 'flying-card card-base';
            const rect = elem.getBoundingClientRect();
            
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.margin = '0';
            clone.style.transform = `scale(${gameScale})`;
            document.body.appendChild(clone);

            const pileContainer = document.getElementById('pile-container');
            if(!pileContainer) return;
            const pileRect = pileContainer.getBoundingClientRect();
            
            requestAnimationFrame(() => {
                clone.style.transition = 'all 0.3s ease-out';
                clone.style.left = pileRect.left + 'px';
                clone.style.top = pileRect.top + 'px';
                clone.style.transform = `scale(${gameScale}) rotate(${Math.random()*40-20}deg)`;
                clone.style.opacity = 0.5;
            });
            
            setTimeout(() => { if (document.body.contains(clone)) clone.remove(); }, 300);
        }

        // === UI HELPERS ===
        function distributePlayers(players, curName, isMyTurn) {
            const myIdx = players.findIndex(p => p.id === myId);
            if (myIdx === -1) return;
            
            const myInfo = document.getElementById('my-info-container');
            if(myInfo) {
                myInfo.innerHTML = `
                    <div class="panel player-info ${isMyTurn ? 'active' : ''}">
                        ${isMyTurn ? '<div class="turn-indicator-dot"></div>' : ''}
                        <div style="font-weight:bold; font-size:18px;">${players[myIdx].name}</div>
                        ${players[myIdx].hats > 0 ? `<div style="margin-top:2px;">${"🎩".repeat(players[myIdx].hats)}</div>` : ''}
                    </div>`;
            }

            const others = players.slice(myIdx).concat(players.slice(0, myIdx)).slice(1);
            const slotIds = ['slot-left', 'slot-top', 'slot-right'];
            slotIds.forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML = ''; });

            others.forEach((p, i) => {
                const container = document.getElementById(slotIds[i]);
                if(!container) return;
                const active = p.name === curName;
                container.innerHTML = `
                    <div class="panel player-info ${active ? 'active' : ''}" style="opacity:${p.connected ? 1 : 0.4}">
                        ${active ? '<div class="turn-indicator-dot"></div>' : ''}
                        <div style="font-weight:bold; font-size:18px;">${p.name}${p.connected ? '' : ' (Αποσ.)'}</div>
                        ${p.hats > 0 ? `<div style="margin-top:2px;">${"🎩".repeat(p.hats)}</div>` : ''}
                    </div>
                    <div class="opp-hand" style="width:${30 + (Math.min(p.handCount, 15) - 1) * 8}px">
                        ${Array(Math.min(p.handCount, 15)).fill(0).map((_, idx) => `<div class="mini-card" style="left:${idx * 8}px; z-index:${idx};"></div>`).join('')}
                    </div>
                    <div class="card-count-box">${p.handCount} φύλλα</div>`;
            });
        }

        // === REVEAL HANDS (ΤΕΛΟΣ ΓΥΡΟΥ ΜΕ ΤΙΣ ΣΤΟΙΒΕΣ ΣΟΥ) ===
        socket.on('revealHands', playersData => {
            const timerContainer = document.getElementById("turn-timer");
            if(timerContainer) timerContainer.style.display = "none";
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            const others = playersData.filter(p => p.id !== myId);
            const slots = ['slot-left', 'slot-top', 'slot-right'];
            
            others.forEach((p, i) => {
                const container = document.getElementById(slots[i]);
                if(container && p.hand) {
                    let cardsHtml = '';
                    p.hand.forEach((c, idx) => {
                        if(!c) return;
                        const isRed = (c.color === 'red');
                        cardsHtml += `<div class="card" style="color:${isRed ? '#d00' : 'black'}; z-index:${idx};">${c.value}<div style="font-size:12px;">${c.suit}</div></div>`;
                    });
                    
                    container.innerHTML = `
                        <div class="panel player-info" style="opacity: 1">
                            <div style="font-weight:bold;">${p.name}</div>
                            <div style="font-size:13px; color:#4f4; margin-top:3px;">Σκορ: ${p.totalScore}</div>
                        </div>
                        <div class="player-cards">${cardsHtml}</div>
                        <div class="card-count-box">${p.hand.length} φύλλα</div>`;
                }
            });
        });

        // === CHAT & SCOREBOARD ===
        socket.on('rejoinSuccess', data => {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('start-screen').style.display = 'none';
            if (data.gameStarted && data.history) {
                fullScoreHistory = data.history;
                renderScoreboard();
                document.getElementById('scoreboard').style.display = 'block';
            }
        });

        socket.on('updateScoreboard', data => {
            fullScoreHistory = data.history;
            renderScoreboard();
            document.getElementById('scoreboard').style.display = 'block';
        });

        function renderScoreboard() {
            const table = document.getElementById('score-table');
            if (!table || !fullScoreHistory.length) return;
            const pIds = Object.keys(fullScoreHistory[0]);
            const pMap = {};
            (window.currentScoreData?.players || []).forEach(p => pMap[p.id] = p);
            
            let html = `<tr>${pIds.map(id => `<th>${pMap[id]?.name || 'Π'}${"🎩".repeat(pMap[id]?.hats || 0)}</th>`).join('')}</tr>`;
            const dataToShow = isScoreboardExpanded ? fullScoreHistory : fullScoreHistory.slice(-5);
            dataToShow.forEach(row => {
                html += '<tr>' + pIds.map(id => `<td>${row[id] === "WC" ? '<b style="color:var(--gold)">WC</b>' : row[id]}</td>`).join('') + '</tr>';
            });
            table.innerHTML = html;
        }

        socket.on('invalidMove', () => {
            actionLocked = false; 
            msgQueue.push("⚠️ Άκυρη Κίνηση!");
            if (!isMsgShowing) showNextMsg();
            
            document.querySelectorAll('.hand-card').forEach(c => c.classList.add('shake')); 
            setTimeout(() => document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('shake')), 300); 
        });

        function toggleChat() {
            const b = document.getElementById('chat-box');
            b.style.display = b.style.display === 'flex' ? 'none' : 'flex';
        }
        
        function sendChat() {
            const i = document.getElementById('chat-input');
            if(i.value) { socket.emit('chatMessage', i.value); i.value = ''; }
        }
        
        function forceReconnect() { 
            socket.connected ? joinGame() : socket.connect(); 
        }
    </script>
</body>
</html>
