<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        /* === CSS CONSTANTS & RESET === */
        :root { 
            --gold: #d4af37; 
            --panel-bg: rgba(0, 0, 0, 0.85);
            --felt-green: radial-gradient(circle at center, #0b6b38 0%, #05351c 80%);
        }
        
        body { 
            background: var(--felt-green);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            border: 15px solid #2b1d12;
            box-sizing: border-box;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            user-select: none; 
            -webkit-user-select: none;
            display: flex; 
            align-items: center; 
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* === 3D VIEWPORT === */
        #game-wrapper {
            width: 1280px; 
            height: 720px;
            position: relative;
            background: transparent;
            display: grid;
            grid-template-areas: 
                ". top ."
                "left center right"
                ". bottom .";
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 150px 1fr 220px;
            transform-origin: center center;
            backface-visibility: hidden;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        #game-wrapper::before {
            content: "";
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            box-shadow: 0 0 200px rgba(0,0,0,.9) inset;
            pointer-events: none;
            z-index: 1; 
        }

        /* === UI COMPONENTS === */
        .panel {
            background: var(--panel-bg); 
            border: 2px solid var(--gold); 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .card-base {
            width: 110px; 
            height: 160px; 
            background: white; 
            border-radius: 10px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            color: black;
            position: relative;
        }

        #msg-overlay { 
            display: none; 
            position: absolute; 
            top: -75px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 6000; 
            font-size: 30px; 
            color: var(--gold); 
            font-weight: bold; 
            text-shadow: 2px 2px 10px black; 
            pointer-events: none; 
            text-align: center; 
            width: 600px;
            white-space: pre-line; 
            line-height: 1.3;
        }

        #victory-screen {
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 10000;
            background: rgba(0,0,0,0.92); 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px;
            animation: fadeVictory .5s ease;
        }
        
        @keyframes fadeVictory {
            from { opacity: 0; transform: scale(.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* === CHAT & RECONNECT === */
        #chat-toggle { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            width: 60px; 
            height: 60px; 
            background: var(--gold); 
            border-radius: 50%; 
            border: none; 
            font-size: 30px; 
            cursor: pointer; 
            z-index: 7000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        #reconnect-btn { 
            position: absolute; 
            bottom: 20px; 
            left: 90px; 
            height: 60px; 
            padding: 0 20px; 
            background: #b30000; 
            border-radius: 30px; 
            border: 2px solid var(--gold); 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            z-index: 7000; 
            color: white; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }
        
        #chat-box { 
            position: absolute; 
            bottom: 90px; 
            left: 20px; 
            width: 300px; 
            height: 350px; 
            display: none; 
            flex-direction: column; 
            z-index: 7000; 
        }
        
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            font-size: 14px; 
            color: #eee; 
            text-align: left; 
        }
        
        #chat-input-area { 
            display: flex; 
            padding: 10px; 
            border-top: 1px solid #444; 
        }
        
        #chat-input { 
            flex: 1; 
            background: #222; 
            border: 1px solid var(--gold); 
            color: white; 
            padding: 8px; 
            border-radius: 5px; 
            outline: none; 
        }

        /* === LOGIN SCREEN === */
        #start-screen { 
            position: fixed; 
            inset: 0; 
            z-index: 8000; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        .name-input {
            background: transparent; 
            border: none; 
            border-bottom: 3px solid var(--gold);
            color: white; 
            font-size: 30px; 
            text-align: center; 
            padding: 10px;
            margin-bottom: 30px; 
            outline: none; 
            width: 300px;
        }

        .game-btn { 
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a); 
            border: 2px solid #666; 
            border-radius: 10px; 
            color: white; 
            padding: 15px 35px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 5px 0 #111; 
            transition: transform 0.1s;
        }
        
        .game-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #111; }

        /* === TOP UI === */
        #top-right-ui {
            position: absolute; 
            top: 15px; 
            right: 20px; 
            z-index: 1000;
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        
        #turn-timer { 
            position: relative; 
            width: 52px; 
            height: 52px; 
            display: none; 
        }
        
        .timer-bg { stroke: #444; fill: rgba(0,0,0,0.5); }
        .timer-bar {
            stroke: #00ff9c; 
            fill: none;
            stroke-dasharray: 139; 
            stroke-dashoffset: 0;
            transform: rotate(-90deg); 
            transform-origin: center;
        }
        
        #timer-text {
            position: absolute; 
            inset: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px; 
            font-weight: bold; 
            color: white;
        }
        
        #turn-indicator { 
            padding: 10px 25px; 
            font-weight: bold; 
            font-size: 18px; 
            white-space: nowrap;
        }

        /* === PLAYER SLOTS === */
        .player-slot { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            z-index: 10; 
        }
        
        .player-info {
            position: relative; 
            padding: 5px 15px; 
            text-align: center; 
            min-width: 140px;
            margin-bottom: 10px; 
            transition: all 0.3s ease;
        }
        
        .player-info.active {
            animation: pulse 1.2s infinite;
            border-color: #4f4;
            background: rgba(0, 40, 0, 0.9);
        }
        
        @keyframes pulse {
            0% { box-shadow:0 0 0 0 rgba(0,255,150,.6); }
            70% { box-shadow:0 0 0 12px rgba(0,255,150,0); }
            100% { box-shadow:0 0 0 0 rgba(0,255,150,0); }
        }

        .turn-indicator-dot {
            position: absolute;
            top: -6px; right: -6px;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #00ff9c;
            box-shadow: 0 0 8px #00ff9c;
            animation: blink 1s infinite;
            z-index: 50;
        }
        
        @keyframes blink {
            0% { opacity: .2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: .2; transform: scale(0.8); }
        }

        .opp-hand { 
            position: relative; 
            height: 45px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: center; 
        }
        
        .mini-card { 
            width: 30px; 
            height: 45px; 
            background: linear-gradient(135deg, #a00, #500); 
            border: 1.5px solid white; 
            border-radius: 4px; 
            position: absolute; 
            top: 0; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); 
        }

        /* === CENTER AREA === */
        #draw-pile { 
            position: relative;
            width: 100px; height: 145px; 
            background: linear-gradient(135deg, #8e2424, #4d0000); 
            border: 3px solid white; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6); 
            transition: transform 0.2s ease;
            transform-style: preserve-3d;
            transform: translateZ(20px);
        }
        
        #draw-pile::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 10px; border: 3px solid white; z-index: -1;
            transform: translate(4px, 4px) translateZ(-1px);
        }
        
        #draw-pile:hover { transform: translateZ(20px) scale(1.08); }
        #deck-count { font-size: 28px; font-weight: bold; color: var(--gold); }

        .pile-card {
            position: absolute; 
            top: 0; left: 0;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.3); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 8px; 
            transition: transform 0.2s;
        }
        
        .played-card { animation: cardThrow .35s cubic-bezier(.25,.8,.25,1) forwards; }
        @keyframes cardThrow {
            0% { transform: translateY(60px) scale(.9) rotate(-5deg); opacity: .4; }
            100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
        }

        /* === MY HAND === */
        #my-hand-container { 
            width: 90%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 180px; 
            margin: 0 auto; 
        }
        
        .not-my-turn .hand-card { pointer-events: none; opacity: 0.8; }
        
        .hand-card { 
            box-shadow: -2px 0 5px rgba(0,0,0,0.3); 
            cursor: pointer; 
            transition: transform 0.2s, margin 0.2s;
        }
        
        .hand-card:hover { 
            transform: translateY(-40px) scale(1.1); 
            z-index: 100; 
        }

        .hand-compact .hand-card { width: 77px; height: 112px; margin-bottom: -40px; }
        
        .red { color: #d00 !important; }
        .card-corner { position: absolute; top: 5px; left: 5px; font-size: 24px; font-weight: bold; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card-corner.bottom { top: auto; bottom: 5px; left: auto; right: 5px; transform: rotate(180deg); }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; }

        /* === ANIMATIONS & MODALS === */
        .flying-card {
            position: fixed; 
            z-index: 9999; 
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        
        #ace-modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.7); 
            z-index: 9000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        #ace-content { 
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid var(--gold);
            text-align: center;
        }

        .suit-btn { 
            width: 90px; height: 90px; 
            font-size: 55px; 
            background: white; 
            border-radius: 15px; 
            margin: 15px; 
            cursor: pointer; 
            border: 4px solid var(--gold); 
        }
        
        #direction-indicator {
            position: absolute; bottom: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.8);
            border: 2px solid var(--gold); border-radius: 15px;
            font-weight: bold; font-size: 20px; color: var(--gold);
            z-index: 1000;
        }

        .shake { animation: shake 0.2s; border-color: red !important; }
        @keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-5px);} 75% {transform:translateX(5px);} }
        
        #scoreboard { 
            position: absolute; top: 20px; left: 20px; 
            max-height: 400px; overflow-y: auto; display: none; 
        }
        table { border-collapse: collapse; width: 100%; color: white; }
        th, td { border: 1px solid var(--gold); padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:60px; margin-bottom:10px;">Μαύρος Βαλές ♠️</h1>
        <div id="login-area" style="display:flex; flex-direction:column; align-items:center;">
            <input type="text" id="username" class="name-input" placeholder="Το όνομά σου..." maxlength="12">
            <button id="login-btn" class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ</button>
        </div>
        <div id="waiting-area" style="display:none; text-align:center;">
            <p id="waiting-msg" style="font-size:24px; color:#aaa; margin-bottom:20px;">Σύνδεση...</p>
            <button id="start-btn" class="game-btn" style="display:none;" onclick="socket.emit('startGameRequest')">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="victory-screen">
        <h1 id="victory-msg" style="color: white; font-size: 50px; margin-bottom: 40px;">🏆</h1>
        <button class="game-btn" onclick="location.reload()">ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
    </div>

    <div id="game-wrapper">
        
        <div id="ace-modal">
            <div id="ace-content">
                <h2 style="color:var(--gold); margin-bottom:20px;">Διάλεξε Χρώμα</h2>
                <button class="suit-btn" style="color:red;" onclick="confirmAce('♥')">♥</button>
                <button class="suit-btn" style="color:red;" onclick="confirmAce('♦')">♦</button>
                <button class="suit-btn" style="color:black;" onclick="confirmAce('♣')">♣</button>
                <button class="suit-btn" style="color:black;" onclick="confirmAce('♠')">♠</button>
                <br>
                <button class="game-btn" style="margin-top:20px; font-size:14px;" onclick="cancelAce()">ΑΚΥΡΩΣΗ</button>
            </div>
        </div>

        <div id="scoreboard" class="panel" onclick="this.style.display='none'">
            <table id="score-table"></table>
        </div>

        <button id="chat-toggle" onclick="toggleChat()">💬</button>
        <div id="chat-box" class="panel">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Πες κάτι..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>

        <div id="direction-indicator"></div>
        
        <div id="top-right-ui">
            <div id="turn-timer">
                <svg width="52" height="52">
                    <circle r="22" cx="26" cy="26" class="timer-bg" stroke-width="4"/>
                    <circle r="22" cx="26" cy="26" class="timer-bar" stroke-width="4"/>
                </svg>
                <div id="timer-text">60</div>
            </div>
            <div id="turn-indicator" class="panel">ΣΥΝΔΕΣΗ...</div>
        </div>
        
        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>

        <div id="game-center" style="grid-area: center; display: flex; align-items: center; justify-content: center; gap: 40px;">
            <div id="draw-pile" onclick="triggerDrawAnimation()">
                <div style="font-size:12px; color:#ccc;">ΤΡΑΒΑ</div>
                <div id="deck-count">52</div>
            </div>
            <div id="pile-container" style="width: 110px; height: 160px; position: relative;">
                <div id="msg-overlay"></div>
                </div>
            <button class="game-btn" onclick="socket.emit('passTurn')">ΠΑΣΟ</button>
        </div>

        <div id="slot-right" class="player-slot"></div>
        <div id="slot-bottom" class="player-slot">
            <div id="my-info-container" style="margin-bottom: 5px;"></div>
            <div id="my-hand-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;
        let lastClick = 0;
        const CLICK_DELAY = 300;
        let actionLocked = false;
        let gameScale = 1;
        let selectedAceIndex = null;
        let lastPlayerId = null;
        let timerEnd = 0;
        let animationFrameId = null;

        // === SOUNDS ===
        const sfx = {
            card: new Audio('sounds/card.mp3'),
            shuffle: new Audio('sounds/shuffle.mp3'),
            penalty: new Audio('sounds/penalty.mp3'),
            win: new Audio('sounds/win.mp3')
        };

        function playSound(type) {
            try { sfx[type].currentTime = 0; sfx[type].play().catch(()=>{}); } catch(e){}
        }

        // === TIMER LOGIC ===
        function startTimer(seconds = 60) {
            const bar = document.querySelector(".timer-bar");
            const text = document.getElementById("timer-text");
            const container = document.getElementById("turn-timer");
            if(!bar) return;

            container.style.display = "block";
            timerEnd = Date.now() + seconds * 1000;

            if(animationFrameId) cancelAnimationFrame(animationFrameId);

            const update = () => {
                const remaining = Math.max(0, timerEnd - Date.now());
                const percent = remaining / (seconds * 1000);
                bar.style.strokeDashoffset = 139 * (1 - percent);
                text.innerText = Math.ceil(remaining / 1000);
                if(remaining > 0) animationFrameId = requestAnimationFrame(update);
            }
            update();
        }

        // === SOCKET EVENTS ===
        socket.on('connect', () => {
            myId = socket.id;
            const name = sessionStorage.getItem('mv_username');
            const session = sessionStorage.getItem('mv_session');
            if(name && session) socket.emit('joinGame', { username:name, sessionId:session });
        });

        socket.on('updateUI', data => {
            actionLocked = false;
            window.currentTopCard = data.topCard;
            window.currentActiveSuit = data.activeSuit;
            
            document.getElementById('deck-count').innerText = data.deckCount;
            
            // Διαχείριση Timer
            if (data.currentPlayerId && data.currentPlayerId !== lastPlayerId) {
                lastPlayerId = data.currentPlayerId;
                startTimer(60);
            }

            // Ενημέρωση Pile
            if (data.topCard) {
                const cardId = data.topCard.value + data.topCard.suit;
                if (cardId !== window.lastCardId) {
                    addCardToPile(data.topCard);
                    window.lastCardId = cardId;
                    playSound('card');
                }
            }

            // Turn Indicator
            const ind = document.getElementById('turn-indicator');
            const handCont = document.getElementById('my-hand-container');
            if (data.isMyTurn) {
                ind.innerText = data.penalty > 0 ? `⚠️ ΦΑΕ ${data.penalty}!` : "ΣΕΙΡΑ ΣΟΥ";
                ind.style.borderColor = "#4f4"; ind.style.color = "#4f4";
                handCont.classList.remove('not-my-turn');
            } else {
                ind.innerText = `ΠΑΙΖΕΙ: ${data.currentPlayerName}`;
                ind.style.borderColor = "#ff4444"; ind.style.color = "#ffdddd";
                handCont.classList.add('not-my-turn');
            }

            renderHand(data.myHand);
            distributePlayers(data.players, data.currentPlayerName, data.isMyTurn);
            updateDirectionIndicator(data.players, data.direction);
        });

        socket.on('notification', msg => {
            if (msg.includes('Ανακάτεμα')) playSound('shuffle');
            else if (msg.includes('ΦΑΕ') || msg.includes('+')) playSound('penalty');
            const o = document.getElementById('msg-overlay');
            o.innerText = msg; o.style.display = 'block';
            setTimeout(() => o.style.display = 'none', 3000);
        });

        socket.on('updateScoreboard', data => {
            renderScoreboard(data.history, data.players);
            document.getElementById('scoreboard').style.display = 'block';
        });

        socket.on('gameOver', msg => {
            playSound('win');
            document.getElementById('victory-msg').innerText = msg;
            document.getElementById('victory-screen').style.display = 'flex';
        });

        socket.on('playerCountUpdate', count => {
            document.getElementById('waiting-msg').innerText = `Συνδεδεμένοι: ${count}`;
            document.getElementById('start-btn').style.display = count >= 2 ? 'inline-block' : 'none';
        });

        socket.on('joinedLobby', () => {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('waiting-area').style.display = 'block';
        });

        socket.on('chatUpdate', d => {
            const m = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.innerHTML = `<b style="color:var(--gold)">${d.name}:</b> ${d.text}`;
            m.appendChild(div); m.scrollTop = m.scrollHeight;
        });

        // === GAME FUNCTIONS ===
        function joinGame() {
            const name = document.getElementById('username').value.trim();
            if(!name) return;
            const session = sessionStorage.getItem('mv_session') || 'sess_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('mv_session', session);
            sessionStorage.setItem('mv_username', name);
            socket.emit('joinGame', { username: name, sessionId: session });
        }

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            container.className = hand.length > 15 ? 'hand-compact' : 'hand-normal';
            const overlap = hand.length > 10 ? "-60px" : "-40px";
            
            container.innerHTML = '';
            hand.forEach((card, i) => {
                const div = document.createElement('div');
                const isRed = card.suit === '♥' || card.suit === '♦';
                div.className = `card-base hand-card card-${i} ${isRed ? 'red' : ''}`;
                div.style.marginLeft = i === 0 ? '0' : overlap;
                div.innerHTML = `
                    <div class="card-corner">${card.value}<div>${card.suit}</div></div>
                    <div class="card-center">${card.suit}</div>
                    <div class="card-corner bottom">${card.value}<div>${card.suit}</div></div>
                `;
                div.onclick = () => playCardLogic(i, card.value, card.suit);
                container.appendChild(div);
            });
        }

        // === CARD LOGIC UPDATE (FULL) ===
        function playCardLogic(index, value, suit) {
            const handCont = document.getElementById('my-hand-container');
            if (!handCont || handCont.classList.contains('not-my-turn')) return;
            if (actionLocked || Date.now() - lastClick < CLICK_DELAY) return;

            const topCard = window.currentTopCard;
            const effectiveSuit = window.currentActiveSuit || (topCard ? topCard.suit : null);
            const isTopAce = topCard && topCard.value === 'A';

            // Έλεγχος για Άσσο
            if (value === 'A' && !(isTopAce && suit === effectiveSuit)) {
                selectedAceIndex = index;
                document.getElementById('ace-modal').style.display = 'flex';
                return;
            }

            executePlayCard(index, null);
        }

        function confirmAce(suit) {
            if (selectedAceIndex === null) return;
            executePlayCard(selectedAceIndex, suit);
            document.getElementById('ace-modal').style.display = 'none';
            selectedAceIndex = null;
        }

        function cancelAce() {
            document.getElementById('ace-modal').style.display = 'none';
            selectedAceIndex = null;
            actionLocked = false;
        }

        function executePlayCard(index, declaredSuit) {
            const cardElement = document.querySelector(`.card-${index}`);
            if (cardElement) animateThrow(cardElement);

            actionLocked = true;
            lastClick = Date.now();
            socket.emit('playCard', { index: index, declaredSuit: declaredSuit });
        }

        // === ANIMATIONS ===
        function animateThrow(el) {
            const clone = el.cloneNode(true);
            const rect = el.getBoundingClientRect();
            clone.className = 'flying-card';
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            document.body.appendChild(clone);

            const target = document.getElementById('pile-container').getBoundingClientRect();
            requestAnimationFrame(() => {
                clone.style.left = target.left + 'px';
                clone.style.top = target.top + 'px';
                clone.style.transform = `rotate(${Math.random()*40-20}deg) scale(0.9)`;
                clone.style.opacity = "0.5";
            });
            setTimeout(() => clone.remove(), 400);
        }

        function triggerDrawAnimation() {
            if (actionLocked || document.getElementById('my-hand-container').classList.contains('not-my-turn')) return;
            actionLocked = true;
            const start = document.getElementById('draw-pile').getBoundingClientRect();
            const clone = document.createElement('div');
            clone.className = 'mini-card flying-card';
            clone.style.left = start.left + 'px'; clone.style.top = start.top + 'px';
            document.body.appendChild(clone);

            const end = document.getElementById('my-hand-container').getBoundingClientRect();
            requestAnimationFrame(() => {
                clone.style.left = end.left + 'px'; clone.style.top = end.top + 'px';
                clone.style.opacity = "0";
            });
            setTimeout(() => { clone.remove(); socket.emit('drawCard'); }, 400);
        }

        function addCardToPile(card) {
            const container = document.getElementById('pile-container');
            const div = document.createElement('div');
            const isRed = card.suit === '♥' || card.suit === '♦';
            div.className = `card-base pile-card played-card ${isRed ? 'red' : ''}`;
            div.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px) rotate(${Math.random()*20-10}deg)`;
            div.innerHTML = `
                <div class="card-corner">${card.value}<div>${card.suit}</div></div>
                <div class="card-center">${card.suit}</div>
                <div class="card-corner bottom">${card.value}<div>${card.suit}</div></div>
            `;
            container.appendChild(div);
            if (container.children.length > 6) container.removeChild(container.children[1]); // keep msg-overlay
        }

        // === HELPERS ===
        function distributePlayers(players, curName, isMyTurn) {
            const myIdx = players.findIndex(p => p.id === myId);
            if (myIdx === -1) return;
            
            // My Info
            document.getElementById('my-info-container').innerHTML = `
                <div class="panel player-info ${isMyTurn ? 'active' : ''}">
                    <b>${players[myIdx].name}</b> ${"🎩".repeat(players[myIdx].hats)}
                </div>
            `;

            const others = players.slice(myIdx).concat(players.slice(0, myIdx)).slice(1);
            const slots = ['slot-left', 'slot-top', 'slot-right'];
            slots.forEach(s => document.getElementById(s).innerHTML = '');

            others.forEach((p, i) => {
                const active = p.name === curName;
                document.getElementById(slots[i]).innerHTML = `
                    <div class="panel player-info ${active ? 'active' : ''}" style="opacity:${p.connected ? 1 : 0.5}">
                        ${active ? '<div class="turn-indicator-dot"></div>' : ''}
                        ${p.name} ${"🎩".repeat(p.hats)}
                    </div>
                    <div class="opp-hand">
                        ${Array(Math.min(p.handCount, 8)).fill('<div class="mini-card"></div>').map((c, idx) => `<div class="mini-card" style="left:${idx*7}px"></div>`).join('')}
                    </div>
                    <div style="font-size:12px; margin-top:5px;">${p.handCount} κάρτες</div>
                `;
            });
        }

        function renderScoreboard(history, players) {
            const table = document.getElementById('score-table');
            if (!history.length) return;
            const pIds = Object.keys(history[0]);
            let html = "<tr><th>Γύρος</th>" + pIds.map(id => `<th>${players.find(p=>p.id===id)?.name || 'Π'}</th>`).join('') + "</tr>";
            history.forEach((row, i) => {
                html += `<tr><td>${i+1}</td>` + pIds.map(id => `<td>${row[id]}</td>`).join('') + "</tr>";
            });
            table.innerHTML = html;
        }

        function updateDirectionIndicator(players, dir) {
            const initials = players.map(p => p.name.charAt(0).toUpperCase());
            document.getElementById('direction-indicator').innerText = dir === 1 ? initials.join(' → ') : initials.join(' ← ');
        }

        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) { socket.emit('chatMessage', input.value); input.value = ''; }
        }

        window.addEventListener('resize', resizeGame);
        resizeGame();
    </script>
</body>
</html>
