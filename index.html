<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Μαύρος Βαλές ♠️</title>

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/cards.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/portrait.css">
</head>
<body>

    <div id="error-overlay">
        <h2 style="color: white;">ΠΡΟΕΚΥΨΕ ΣΦΑΛΜΑ!</h2>
        <p id="error-text" style="font-family: monospace; background: black; padding: 15px; color: #ff4444; border-radius: 5px;"></p>
        <button class="game-btn" onclick="window.location.reload()">ΕΠΑΝΑΦΟΡΤΩΣΗ ΣΕΛΙΔΑΣ</button>
    </div>

    <div id="rotate-msg">
        <div style="font-size: 50px;">🔄</div>
        <h2>Παρακαλώ γυρίστε τη συσκευή οριζόντια</h2>
    </div>

    <div id="start-screen">
        <h1 id="game-title">Μαύρος Βαλές ♠️</h1>

        <div id="login-area">
            <input type="text" id="username" class="name-input" placeholder="Το όνομά σου..." maxlength="15">
            <button id="login-btn" class="game-btn">ΕΙΣΟΔΟΣ</button>
        </div>

        <div id="waiting-area">
            <p id="waiting-msg">Σύνδεση...</p>
            <button id="start-btn" class="game-btn">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="victory-screen">
        <h1 id="victory-msg">🏆</h1>
        <button class="game-btn victory-btn" onclick="location.reload()">ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
    </div>

    <div id="game-wrapper">

        <div id="ace-modal">
            <div id="ace-backdrop"></div>
            <div id="ace-content">
                <h2 id="ace-title">Διάλεξε Χρώμα</h2>
                <div>
                    <button class="suit-btn suit-red" data-suit="♥">♥</button>
                    <button class="suit-btn suit-red" data-suit="♦">♦</button>
                    <button class="suit-btn suit-black" data-suit="♣">♣</button>
                    <button class="suit-btn suit-black" data-suit="♠">♠</button>
                </div>
                <br>
                <button class="game-btn small-btn" id="ace-cancel-btn">ΑΚΥΡΩΣΗ</button>
            </div>
        </div>

        <div id="scoreboard" class="panel">
            <table id="score-table"></table>
        </div>

        <button id="chat-toggle">💬</button>
        <button id="score-toggle">📊</button>
        <button id="reconnect-btn">🔄 Reconnect</button>

        <div id="chat-box" class="panel">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Πες κάτι...">
            </div>
        </div>

        <div id="direction-indicator"></div>

        <div id="top-right-ui">
            <div id="turn-timer">
                <svg width="52" height="52">
                    <circle r="22" cx="26" cy="26" class="timer-bg" stroke-width="4"></circle>
                    <circle r="22" cx="26" cy="26" class="timer-bar" stroke-width="4"></circle>
                </svg>
                <div id="timer-text">60</div>
            </div>
            <div id="turn-indicator">ΣΥΝΔΕΣΗ...</div>
        </div>

        <div id="active-suit-display"></div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>

        <div id="game-center">
            <div id="msg-overlay"></div>

            <div id="draw-pile">
                <div class="draw-label">ΤΡΑΒΑ</div>
                <div id="deck-count">52</div>
            </div>

            <div id="pile-container"></div>

            <button class="game-btn" id="pass-btn">ΠΑΣΟ</button>
        </div>

        <div id="slot-right" class="player-slot"></div>

        <div id="slot-bottom" class="player-slot">
            <div id="my-info-container"></div>
            <div id="my-hand-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/state.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/hand.js"></script>
    <script src="js/socket-events.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
