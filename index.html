<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μαύρος Βαλές ♠️</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --panel-bg: rgba(0, 0, 0, 0.85);
        }
        
        body { 
            background: radial-gradient(circle at center, #0b6b38 0%, #05351c 80%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            border: 15px solid #2b1d12;
            box-sizing: border-box;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #game-wrapper {
            width: 1280px; height: 720px;
            position: relative;
            background: transparent;
            display: grid;
            grid-template-areas: 
                ". top ."
                "left center right"
                ". bottom .";
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 150px 1fr 220px;
            transform-origin: center center;
            backface-visibility: hidden;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        #game-wrapper::before {
            content: "";
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            box-shadow: 0 0 200px rgba(0,0,0,.9) inset;
            pointer-events: none;
            z-index: 1; 
        }

        .panel {
            background: var(--panel-bg); 
            border: 2px solid var(--gold); 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        .card-base {
            width: 110px; height: 160px; 
            background: white; border-radius: 10px; border: 1px solid #ccc; 
            box-sizing: border-box; color: black;
        }

        #msg-overlay { 
            display: none; position: absolute; top: -75px; left: 50%; transform: translateX(-50%); 
            z-index: 6000; font-size: 30px; color: var(--gold); font-weight: bold; 
            text-shadow: 2px 2px 10px black; pointer-events: none; text-align: center; width: 600px;
            white-space: pre-line; line-height: 1.3; justify-content: center; align-items: center;
        }

        #victory-screen {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.92); flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            animation: fadeVictory .5s ease;
        }
        @keyframes fadeVictory {
            from { opacity: 0; transform: scale(.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        #chat-toggle { position: absolute; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; border: none; font-size: 30px; cursor: pointer; z-index: 7000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #reconnect-btn { position: absolute; bottom: 20px; left: 90px; height: 60px; padding: 0 20px; background: #b30000; border-radius: 30px; border: 2px solid var(--gold); font-size: 20px; font-weight: bold; cursor: pointer; z-index: 7000; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
        
        #chat-box { position: absolute; bottom: 90px; left: 20px; width: 300px; height: 350px; display: none; flex-direction: column; z-index: 7000; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; color: #eee; text-align: left; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        #chat-input { flex: 1; background: #222; border: 1px solid var(--gold); color: white; padding: 8px; border-radius: 5px; outline: none; }

        #rotate-msg {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: black; color: white; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        @media screen and (orientation: portrait) { #rotate-msg { display: flex; } }

        #start-screen { 
            position: fixed; inset: 0; z-index: 8000; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        
        .name-input {
            background: transparent; border: none; border-bottom: 3px solid var(--gold);
            color: white; font-size: 30px; text-align: center; padding: 10px;
            margin-bottom: 30px; outline: none; width: 300px;
        }

        .game-btn { 
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a); 
            border: 2px solid #666; border-radius: 10px; 
            color: white; padding: 15px 35px; font-size: 20px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #111; 
            transition: transform 0.1s;
        }
        .game-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #111; }
        
        #direction-indicator {
            position: absolute; bottom: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.8);
            border: 2px solid var(--gold); border-radius: 15px;
            font-weight: bold; font-size: 20px; color: var(--gold);
            z-index: 1000; letter-spacing: 2px;
            white-space: nowrap;
        }

        /* ΝΕΟ CONTAINER ΓΙΑ TIMER + INDICATOR ΟΜΟΡΦΑ ΣΤΟΙΧΙΣΜΕΝΑ ΔΙΠΛΑ-ΔΙΠΛΑ */
        #top-right-ui {
            position: absolute; top: 15px; right: 20px; z-index: 1000;
            display: flex; align-items: center; gap: 10px;
        }

        #turn-timer { position: relative; width: 52px; height: 52px; display: none; }
        .timer-bg { stroke: #444; fill: rgba(0,0,0,0.5); }
        .timer-bar {
            stroke: #00ff9c; fill: none;
            stroke-dasharray: 139; /* 2 * PI * 22 */
            stroke-dashoffset: 0;
            transform: rotate(-90deg); transform-origin: center;
        }
        #timer-text {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; color: white; text-shadow: 1px 1px 3px black;
        }

        #turn-indicator { 
            padding: 10px 25px; background: #1a472a; 
            border: 3px solid #4f4; border-radius: 15px; 
            font-weight: bold; font-size: 18px; color: white;
            white-space: nowrap;
        }

        #active-suit-display {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; z-index: 100; text-shadow: 0 0 20px black; display: none; pointer-events: none; opacity: 0.6;
        }

        .player-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        #slot-top { grid-area: top; }
        #slot-left { grid-area: left; }
        #slot-right { grid-area: right; }
        #slot-bottom { grid-area: bottom; align-self: center; width: 100%; }

        .player-info {
            position: relative; 
            padding: 5px 15px; text-align: center; min-width: 140px;
            margin-bottom: 10px; transition: all 0.3s ease;
        }
        .player-info.active {
            animation: pulse 1.2s infinite;
            border-color: #4f4;
            background: rgba(0, 40, 0, 0.9);
        }
        @keyframes pulse {
            0% { box-shadow:0 0 0 0 rgba(0,255,150,.6); }
            70% { box-shadow:0 0 0 12px rgba(0,255,150,0); }
            100% { box-shadow:0 0 0 0 rgba(0,255,150,0); }
        }

        .turn-indicator-dot {
            position: absolute;
            top: -6px; right: -6px;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #00ff9c;
            box-shadow: 0 0 8px #00ff9c;
            animation: blink 1s infinite;
            z-index: 50;
        }
        @keyframes blink {
            0% { opacity: .2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: .2; transform: scale(0.8); }
        }

        .player-name { font-weight: bold; color: var(--gold); font-size: 16px; }
        .hats-container { font-size: 20px; margin-top: 3px; }

        .opp-hand { position: relative; height: 45px; margin: 0 auto; transition: width 0.3s; }
        .mini-card { width: 30px; height: 45px; background: linear-gradient(135deg, #a00, #500); border: 1.5px solid white; border-radius: 4px; position: absolute; top: 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .card-count-text { font-size: 15px; font-weight: bold; color: #fff; margin-top: 8px; text-shadow: 1px 1px 3px black; text-align: center; width: 100%; }

        #game-center { grid-area: center; display: flex; align-items: center; justify-content: center; gap: 40px; z-index: 20; position: relative; }
        
        #draw-pile { 
            position: relative;
            width: 100px; height: 145px; background: linear-gradient(135deg, #8e2424, #4d0000); 
            border: 3px solid white; border-radius: 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6); transition: transform 0.2s ease;
            transform-style: preserve-3d;
            transform: translateZ(20px);
        }
        #draw-pile::before, #draw-pile::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 10px; border: 3px solid white; z-index: -1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #draw-pile::before { transform: translate(4px, 4px) translateZ(-1px); }
        #draw-pile::after { transform: translate(8px, 8px) translateZ(-2px); }
        
        #draw-pile:hover { transform: translateZ(20px) scale(1.08); }
        #deck-count { font-size: 28px; font-weight: bold; color: var(--gold); margin-top: 5px; }

        #pile-container { 
            width: 110px; height: 160px; position: relative; 
            transform: translateZ(30px); transform-style: preserve-3d;
        }
        
        .pile-card {
            position: absolute; top: 0; left: 0;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; padding: 8px; 
            transition: transform 0.2s;
        }
        
        .played-card { animation: cardThrow .35s cubic-bezier(.25,.8,.25,1) forwards; }
        @keyframes cardThrow {
            0% { transform: translateY(60px) scale(.9) rotate(-5deg); opacity: .4; }
            60% { transform: translateY(-10px) scale(1.05) rotate(2deg); }
            100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
        }

        .card { 
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s; flex-shrink: 0; 
            backface-visibility: hidden;
        }
        
        .red { color: #d00 !important; }
        .card-corner { position: absolute; top: 5px; left: 5px; font-size: 24px; font-weight: bold; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card-corner.bottom { top: auto; bottom: 5px; left: auto; right: 5px; transform: rotate(180deg); }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; }

        .flying-card {
            position: fixed; z-index: 9999; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5); transform-origin: top left;
        }
        
        #scoreboard { 
            position: absolute; top: 20px; left: 20px; 
            padding: 10px; z-index: 1000; font-size: 14px; 
            max-height: 300px; overflow-y: auto; display: none; color: white; cursor: pointer; 
        }
        #scoreboard:hover { background: rgba(0,0,0,0.95); }
        
        #my-hand-container { width: 90%; display: flex; justify-content: center; align-items: center; height: 180px; margin: 0 auto; transition: opacity 0.3s; }
        
        /* ΜΟΝΟ BLOCK CLICKS - ΔΕΝ ΑΛΛΑΖΕΙ ΤΟ OPACITY ΠΛΕΟΝ */
        .not-my-turn .hand-card {
            pointer-events: none;
        }

        .hand-normal { flex-wrap: nowrap; }
        .hand-compact { flex-wrap: wrap; align-content: center; height: 220px !important; }
        
        .hand-card { box-shadow: -2px 0 5px rgba(0,0,0,0.3); }
        
        .hand-compact .hand-card { width: 77px; height: 112px; margin-bottom: -40px; }
        .hand-compact .card-center { font-size: 40px; }
        .hand-compact .card-corner { font-size: 16px; }

        @media (hover: hover) and (pointer: fine) {
            .hand-card:hover { transform: translateY(-50px) scale(1.1); z-index: 100; will-change: transform; }
            .hand-compact .hand-card:hover { transform: translateY(-20px) scale(1.2); z-index: 200; will-change: transform; }
        }

        #ace-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        #ace-backdrop { position: absolute; inset: 0; }
        #ace-content { position: relative; z-index: 1; text-align: center; }

        .suit-btn { width: 90px; height: 90px; font-size: 55px; background: white; border-radius: 15px; margin: 15px; cursor: pointer; border: 4px solid var(--gold); }
        
        #error-overlay {
            display: none; position: fixed; inset: 0; z-index: 99999;
            background: rgba(150, 0, 0, 0.9); flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; text-align: center;
        }
        
        .shake { animation: shake 0.2s; border-color: red !important; }
        @keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-5px);} 75% {transform:translateX(5px);} }
    </style>
</head>
<body>

    <div id="error-overlay">
        <h2>ΠΡΟΕΚΥΨΕ ΣΦΑΛΜΑ ΚΩΔΙΚΑ!</h2>
        <p id="error-text" style="font-family: monospace; background: black; padding: 10px;"></p>
        <button onclick="window.location.reload()" style="padding:10px 20px; font-size:20px; cursor:pointer;">ΕΠΑΝΑΦΟΡΤΩΣΗ ΣΕΛΙΔΑΣ</button>
    </div>

    <div id="rotate-msg">
        <div style="font-size: 50px;">🔄</div>
        <h2>Παρακαλώ γυρίστε τη συσκευή οριζόντια</h2>
    </div>

    <div id="start-screen">
        <h1 style="color:var(--gold); font-size:80px; margin-bottom:10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); text-align:center;">Μαύρος Βαλές ♠️</h1>
        <div id="login-area" style="display:flex; flex-direction:column; align-items:center;">
            <input type="text" id="username" class="name-input" placeholder="Το όνομά σου..." maxlength="12">
            <button class="game-btn" onclick="joinGame()">ΕΙΣΟΔΟΣ</button>
        </div>
        <div id="waiting-area" style="display:none; text-align:center;">
            <p id="waiting-msg" style="font-size:24px; color:#aaa; margin-bottom:20px;">Περιμένοντας παίκτες...</p>
            <button id="start-btn" class="game-btn" style="border-color:#4f4; color:#4f4; display:none;" onclick="socket.emit('startGameRequest')">ΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <div id="victory-screen">
        <div style="font-size: 80px; margin-bottom: 20px;">🏆</div>
        <h1 id="victory-msg" style="color: white; font-size: 50px; text-shadow: 0 0 20px #4f4; line-height: 1.2; max-width: 80%; margin-bottom: 40px;"></h1>
        <button id="victory-btn" class="game-btn" style="font-size: 26px; padding: 20px 40px; border: 3px solid #4f4; color: #4f4; box-shadow: 0 0 15px rgba(79, 255, 68, 0.5);" onclick="location.reload()"></button>
    </div>

    <div id="game-wrapper">
        <div id="ace-modal">
            <div id="ace-backdrop" onclick="cancelAce()"></div>
            <div id="ace-content">
                <h2 style="color:var(--gold); font-size: 40px; margin-bottom:20px;">Διάλεξε Χρώμα</h2>
                <div>
                    <button class="suit-btn" style="color:red;" onclick="confirmAce('♥')">♥</button>
                    <button class="suit-btn" style="color:red;" onclick="confirmAce('♦')">♦</button>
                    <button class="suit-btn" style="color:black;" onclick="confirmAce('♣')">♣</button>
                    <button class="suit-btn" style="color:black;" onclick="confirmAce('♠')">♠</button>
                </div>
            </div>
        </div>

        <div id="scoreboard" class="panel" onclick="toggleScoreboard()"><table id="score-table"></table></div>

        <button id="chat-toggle" onclick="toggleChat()">💬</button>
        <button id="reconnect-btn" onclick="forceReconnect()">🔄 Reconnect</button>
        
        <div id="chat-box" class="panel">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Πες κάτι..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>

        <div id="direction-indicator"></div>
        
        <div id="top-right-ui">
            <div id="turn-timer">
                <svg width="52" height="52" style="position: absolute; top: 0; left: 0;">
                    <circle r="22" cx="26" cy="26" class="timer-bg" stroke-width="4"/>
                    <circle r="22" cx="26" cy="26" class="timer-bar" stroke-width="4"/>
                </svg>
                <div id="timer-text">60</div>
            </div>
            <div id="turn-indicator">ΣΥΝΔΕΣΗ...</div>
        </div>
        
        <div id="active-suit-display"></div>

        <div id="slot-top" class="player-slot"></div>
        <div id="slot-left" class="player-slot"></div>

        <div id="game-center">
            <div id="draw-pile" onclick="triggerDrawAnimation()">
                <div style="font-size:14px; color:#ccc;">ΤΡΑΒΑ</div>
                <div id="deck-count">52</div>
            </div>
            <div id="pile-container">
                <div id="msg-overlay"></div>
            </div>
            <button class="game-btn" onclick="socket.emit('passTurn')">ΠΑΣΟ</button>
        </div>

        <div id="slot-right" class="player-slot"></div>
        <div id="slot-bottom" class="player-slot">
            <div id="my-info-container" style="margin-bottom: 5px;"></div>
            <div id="my-hand-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('error-overlay').style.display = 'flex';
            document.getElementById('error-text').innerText = message + " \nΓραμμή: " + lineno;
        };

        const socket = io();
        let myId, lastTopCardId = null, selectedAceIndex = null;
        let fullScoreHistory = [], isScoreboardExpanded = false;
        let gameScale = 1;
        
        let lastClickTime = 0; 
        const CLICK_DELAY = 300; 
        let actionLocked = false; 
        
        window.currentActiveSuit = null; 
        window.currentTopCard = null;
        window.lastPlayerId = null;

        const sfx = {
            card: new Audio('sounds/card.mp3'),
            shuffle: new Audio('sounds/shuffle.mp3'),
            penalty: new Audio('sounds/penalty.mp3'),
            win: new Audio('sounds/win.mp3')
        };
        
        function playSound(type) {
            try {
                sfx[type].currentTime = 0;
                sfx[type].play().catch(e => {}); 
            } catch(e) {}
        }

        let lastWidth = window.innerWidth;
        let lastHeight = window.innerHeight;
        let resizeTicking = false;

        function resizeGame() {
            if (!resizeTicking) {
                requestAnimationFrame(() => {
                    if (window.innerWidth === lastWidth && window.innerHeight === lastHeight && gameScale !== 1) {
                        resizeTicking = false;
                        return;
                    }
                    const wrapper = document.getElementById('game-wrapper');
                    gameScale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                    wrapper.style.transform = `scale(${gameScale})`;
                    lastWidth = window.innerWidth;
                    lastHeight = window.innerHeight;
                    resizeTicking = false;
                });
                resizeTicking = true;
            }
        }
        
        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', () => {
            resizeGame();
            Object.values(sfx).forEach(a => { a.volume = 0; a.play().catch(()=>{}); a.volume = 1; });
        });

        // ΑΝΑΝΕΩΜΕΝΟΣ TIMER ΜΕ ΑΡΙΘΜΗΤΙΚΗ ΕΝΔΕΙΞΗ
        let timerEnd = 0;
        let animationFrameId;

        function startTimer(seconds = 60) {
            const bar = document.querySelector(".timer-bar");
            const text = document.getElementById("timer-text");
            const timerContainer = document.getElementById("turn-timer");
            if(!bar || !timerContainer || !text) return;
            
            timerContainer.style.display = "block";
            timerEnd = Date.now() + seconds * 1000;
            
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            function updateTimer() {
                const remaining = Math.max(0, timerEnd - Date.now());
                const percent = remaining / (seconds * 1000);
                bar.style.strokeDashoffset = 139 * (1 - percent); // 2 * PI * 22
                
                text.innerText = Math.ceil(remaining / 1000); // Αναγραφή χρόνου

                if (remaining > 0) {
                    animationFrameId = requestAnimationFrame(updateTimer);
                }
            }
            updateTimer();
        }

        setInterval(() => { fetch('/ping').catch(() => {}); }, 60000);

        socket.on('disconnect', () => {
            document.getElementById('reconnect-btn').style.display = 'flex';
        });

        socket.on('connect', () => {
            document.getElementById('reconnect-btn').style.display = 'none';
            myId = socket.id;
            const savedName = sessionStorage.getItem('mv_username');
            const savedSession = sessionStorage.getItem('mv_session');
            
            if (savedName) document.getElementById('username').value = savedName; 
            
            if (savedName && savedSession && document.getElementById('start-screen').style.display === 'none') {
                socket.emit('joinGame', { username: savedName, sessionId: savedSession });
            }
        });

        function forceReconnect() {
            if (socket.disconnected) {
                socket.connect();
            } else {
                joinGame();
            }
        }

        socket.on('chatUpdate', (data) => {
            const m = document.getElementById('chat-messages');
            const div = document.createElement("div");
            
            const b = document.createElement("b");
            b.style.color = "var(--gold)";
            b.textContent = data.name + ": ";
            
            div.appendChild(b);
            div.appendChild(document.createTextNode(data.text));
            
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
        });

        function sendChat() {
            const i = document.getElementById('chat-input');
            if(i.value) { socket.emit('chatMessage', i.value); i.value=''; }
        }

        function toggleChat() {
            const b = document.getElementById('chat-box');
            b.style.display = b.style.display === 'flex' ? 'none' : 'flex';
        }

        socket.on('joinedLobby', () => {
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('login-area').style.display = 'flex'; 
            document.getElementById('waiting-area').style.display = 'none';
            document.getElementById('scoreboard').style.display = 'none';
        });

        socket.on('rejoinSuccess', (data) => {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('start-screen').style.display = 'none';
            if (data.gameStarted) {
                document.getElementById('scoreboard').style.display = 'block';
                if (data.history && data.history.length > 0) {
                    fullScoreHistory = data.history;
                    renderScoreboard();
                }
            } else {
                 document.getElementById('start-screen').style.display = 'flex';
                 document.getElementById('waiting-area').style.display = 'block';
            }
        });

        function joinGame() {
            const name = document.getElementById('username').value;
            if (name.trim() === "") return alert("Παρακαλώ βάλε ένα όνομα!");
            
            let sessionId = sessionStorage.getItem('mv_session');
            if (!sessionId) {
                sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
                sessionStorage.setItem('mv_session', sessionId);
            }
            sessionStorage.setItem('mv_username', name);

            socket.emit('joinGame', { username: name, sessionId: sessionId });
            
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('waiting-area').style.display = 'block';
        }

        socket.on('playerCountUpdate', (count) => {
            document.getElementById('waiting-msg').innerText = `Συνδεδεμένοι παίκτες: ${count}`;
            const btn = document.getElementById('start-btn');
            if(count >= 2) btn.style.display = "inline-block"; else btn.style.display = "none";
        });

        socket.on('gameReady', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('scoreboard').style.display = 'block';
        });

        socket.on('updateUI', (data) => {
            try {
                actionLocked = false; 
                
                window.currentScoreData = data; 
                document.getElementById('deck-count').innerText = data.deckCount;
                window.currentTopCard = data.topCard; 
                window.currentActiveSuit = data.activeSuit; 

                let currentIdToCheck = data.currentPlayerId; 
                if (currentIdToCheck && currentIdToCheck !== window.lastPlayerId) {
                    window.lastPlayerId = currentIdToCheck;
                    startTimer(60); // 60s Start Timer
                }

                if (data.topCard) {
                    const cardId = data.topCard.value + data.topCard.suit;
                    if (cardId !== lastTopCardId) {
                        addCardToPile(data.topCard);
                        lastTopCardId = cardId;
                        playSound('card');
                    }
                }

                const suitDisplay = document.getElementById('active-suit-display');
                if (data.activeSuit) {
                    suitDisplay.innerText = data.activeSuit;
                    suitDisplay.style.color = (data.activeSuit === '♥' || data.activeSuit === '♦') ? '#ff4444' : '#222';
                    suitDisplay.style.display = 'block';
                    suitDisplay.style.textShadow = "0 0 10px white, 0 0 20px white";
                } else { suitDisplay.style.display = 'none'; }

                const ind = document.getElementById('turn-indicator');
                const myHandContainer = document.getElementById('my-hand-container');
                
                if (data.isMyTurn) {
                    ind.innerText = data.penalty > 0 ? `⚠️ ΦΑΕ ${data.penalty}!` : "ΔΙΚΗ ΣΟΥ ΣΕΙΡΑ";
                    ind.style.borderColor = "#4f4"; ind.style.color = "#4f4";
                    myHandContainer.classList.remove('not-my-turn');
                } else {
                    ind.innerText = `ΠΑΙΖΕΙ: ${data.currentPlayerName}`;
                    ind.style.borderColor = "#ff4444"; ind.style.color = "#ffdddd";
                    myHandContainer.classList.add('not-my-turn'); 
                }

                if (data.myHand && Array.isArray(data.myHand)) {
                    renderHand(data.myHand);
                }
                
                distributePlayers(data.players, data.currentPlayerName, data.isMyTurn);
                updateDirectionIndicator(data.players, data.direction);
            } catch(e) {
                document.getElementById('error-overlay').style.display = 'flex';
                document.getElementById('error-text').innerText = e.message;
            }
        });

        socket.on('revealHands', (playersData) => {
            document.getElementById("turn-timer").style.display = "none";
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            const others = playersData.filter(p => p.id !== myId);
            const slots = ['slot-left', 'slot-top', 'slot-right'];
            
            others.forEach((p, i) => {
                if(slots[i] && p.hand) {
                    let cardsHtml = '';
                    p.hand.forEach((c, idx) => {
                        if(!c) return;
                        const color = (c.color === 'red') ? '#d00' : 'black';
                        cardsHtml += `<div style="background:white; color:${color}; width:35px; height:50px; border-radius:4px; border:1px solid #ccc; margin-left:-15px; margin-bottom:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:bold; font-size:16px; box-shadow:2px 2px 5px black; z-index:${idx};">${c.value}<div style="font-size:18px; line-height:1;">${c.suit}</div></div>`;
                    });
                    
                    document.getElementById(slots[i]).innerHTML = `
                        <div class="panel player-info" style="opacity: 1">
                            <div class="player-name">${p.name}</div>
                            <div style="font-size:12px; color:#4f4; margin-top:3px;">Σκορ: ${p.totalScore}</div>
                        </div>
                        <div style="display:flex; flex-wrap:wrap; justify-content:center; padding-left: 15px; max-width: 200px; height: auto; margin: 0 auto;">${cardsHtml}</div>
                        <div class="card-count-text" style="opacity: 1">${p.hand.length} φύλλα</div>`;
                }
            });
        });

        socket.on('gameOver', (finalMsg) => {
            playSound('win');
            document.getElementById('game-wrapper').style.filter = "blur(10px)";
            
            const btnPhrases = [
                "Άντε πάμε άλλο ένα 🃏",
                "Ένα τελευταίο 😂",
                "Θα πάρω το αίμα μου πίσω, πάμε 💪🏻"
            ];
            const randomBtnText = btnPhrases[Math.floor(Math.random() * btnPhrases.length)];
            
            document.getElementById('victory-msg').innerText = finalMsg;
            document.getElementById('victory-btn').innerText = randomBtnText;
            
            document.getElementById('victory-screen').style.display = 'flex';
        });

        function updateDirectionIndicator(playersArray, dir) {
            if(!playersArray || playersArray.length === 0) return;
            let names = playersArray.map(p => (p.name || "").replace('❤️','').trim());
            let initials = names.map(n => n.charAt(0) ? n.charAt(0).toUpperCase() : "?");
            
            for(let i=0; i<initials.length; i++) {
                for(let j=i+1; j<initials.length; j++) {
                    if(initials[i] === initials[j] && initials[i] !== "?") {
                        initials[i] = names[i].substring(0,2).toUpperCase();
                        initials[j] = names[j].substring(0,2).toUpperCase();
                    }
                }
            }
            
            const indicator = document.getElementById('direction-indicator');
            if (dir === 1) {
                indicator.innerText = initials.join(' ➔ ');
            } else {
                indicator.innerText = initials.join(' ⬅ ');
            }
        }

        function distributePlayers(players, currentPlayerName, isMyTurn) {
            if (!players || !Array.isArray(players)) return;
            
            const myIndex = players.findIndex(p => p.id === myId);
            if(myIndex === -1) return;
            
            const me = players[myIndex];
            const myInfo = document.getElementById('my-info-container');
            let hatsHTML = me.hats > 0 ? `<div class="hats-container" style="color:white; font-size:24px;">${"🎩".repeat(me.hats)}</div>` : '';
            
            let myActiveClass = isMyTurn ? 'active' : '';
            let myIndicator = isMyTurn ? '<div class="turn-indicator-dot"></div>' : '';
            
            myInfo.innerHTML = `
                <div class="panel player-info ${myActiveClass}">
                    ${myIndicator}
                    <div class="player-name">${me.name}</div>
                    ${hatsHTML}
                </div>
            `;

            const ordered = players.slice(myIndex).concat(players.slice(0, myIndex));
            const others = ordered.slice(1); 
            
            document.getElementById('slot-top').innerHTML = '';
            document.getElementById('slot-left').innerHTML = '';
            document.getElementById('slot-right').innerHTML = '';

            if (others.length === 1) {
                renderOpponent(others[0], 'slot-top', currentPlayerName);
            } else if (others.length === 2) {
                renderOpponent(others[0], 'slot-left', currentPlayerName);
                renderOpponent(others[1], 'slot-right', currentPlayerName);
            } else if (others.length === 3) {
                renderOpponent(others[0], 'slot-left', currentPlayerName);
                renderOpponent(others[1], 'slot-top', currentPlayerName);
                renderOpponent(others[2], 'slot-right', currentPlayerName);
            }
        }

        function renderOpponent(p, slotId, currentPlayerName) {
            if (!p) return;
            const opacity = p.connected ? 1 : 0.4;
            const name = p.connected ? p.name : (p.name || "Unknown") + " (Αποσ.)";
            let handCount = p.handCount || 0;
            
            let maxDisplay = Math.min(handCount, 15);
            let containerWidth = maxDisplay > 0 ? 30 + (maxDisplay - 1) * 8 : 30;
            
            let cards = `<div class="opp-hand" style="width: ${containerWidth}px; opacity: ${opacity}">`;
            for(let k=0; k<maxDisplay; k++) {
                cards += `<div class="mini-card" style="left: ${k * 8}px; z-index: ${k};"></div>`;
            }
            cards += `</div>`;
            
            let hatsHTML = p.hats > 0 ? `<div class="hats-container">${"🎩".repeat(p.hats)}</div>` : "";
            let activeClass = (p.name === currentPlayerName) ? 'active' : '';
            let indicator = (p.name === currentPlayerName) ? '<div class="turn-indicator-dot"></div>' : '';
            
            document.getElementById(slotId).innerHTML = `
                <div class="panel player-info ${activeClass}" style="opacity: ${opacity}">
                    ${indicator}
                    <div class="player-name">${name}</div>
                    ${hatsHTML}
                </div>
                ${cards}
                <div class="card-count-text" style="opacity: ${opacity}">${handCount} φύλλα</div>`;
        }

        function renderHand(hand) {
            const container = document.getElementById('my-hand-container');
            if (hand.length > 15) { container.classList.add('hand-compact'); container.classList.remove('hand-normal'); } 
            else { container.classList.add('hand-normal'); container.classList.remove('hand-compact'); }

            const frag = document.createDocumentFragment();
            let overlap = (hand.length > 15) ? "-25px" : (hand.length > 8 ? "-60px" : "-55px");

            hand.forEach((c, i) => {
                if(!c) return; 
                const div = document.createElement("div");
                div.className = `card-base card hand-card card-${i}`;
                if (c.suit === '♥' || c.suit === '♦') div.classList.add("red");
                
                div.style.marginLeft = i === 0 ? "0" : overlap;
                
                div.innerHTML = `
                    <div class="card-corner">${c.value}<div>${c.suit}</div></div>
                    <div class="card-center">${c.suit}</div>
                    <div class="card-corner bottom">${c.value}<div>${c.suit}</div></div>
                `;
                
                div.onclick = () => playLogic(i, c.value, c.suit);
                frag.appendChild(div);
            });

            container.innerHTML = "";
            container.appendChild(frag);
        }

        function triggerDrawAnimation() {
            if (document.getElementById('my-hand-container').classList.contains('not-my-turn')) return;
            if (actionLocked || Date.now() - lastClickTime < CLICK_DELAY) return;
            
            actionLocked = true;
            lastClickTime = Date.now();

            const deckEl = document.getElementById('draw-pile');
            const handEl = document.getElementById('my-hand-container');

            const cardEl = document.createElement('div');
            cardEl.style.width = '77px';
            cardEl.style.height = '112px';
            cardEl.style.background = 'linear-gradient(135deg, #a00, #500)';
            cardEl.style.border = '2px solid white';
            cardEl.style.borderRadius = '5px';
            cardEl.style.position = 'fixed';
            cardEl.style.zIndex = 9999;
            cardEl.style.pointerEvents = 'none';
            cardEl.style.boxShadow = '2px 2px 10px rgba(0,0,0,0.5)';
            
            const deckRect = deckEl.getBoundingClientRect();
            const handRect = handEl.getBoundingClientRect();

            cardEl.style.left = deckRect.left + "px";
            cardEl.style.top = deckRect.top + "px";
            cardEl.style.transform = `scale(${gameScale})`;
            
            document.body.appendChild(cardEl);

            requestAnimationFrame(() => {
                cardEl.style.transition = "all .3s cubic-bezier(0.25, 0.8, 0.25, 1)";
                cardEl.style.left = (handRect.left + handRect.width / 2 - 38) + "px";
                cardEl.style.top = (handRect.top - 20) + "px";
                cardEl.style.opacity = "0"; 
                cardEl.style.transform = `scale(${gameScale}) rotate(180deg)`;
            });

            setTimeout(() => cardEl.remove(), 300);
            socket.emit('drawCard');
        }

        function animateThrow(elem) {
            if (!elem) return;
            const rect = elem.getBoundingClientRect();
            const clone = elem.cloneNode(true);
            clone.classList.add('flying-card');
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.margin = '0';
            clone.style.transform = `scale(${gameScale})`; 
            document.body.appendChild(clone);

            const pile = document.getElementById('pile-container');
            const pileRect = pile.getBoundingClientRect();

            setTimeout(() => {
                clone.style.left = pileRect.left + 'px';
                clone.style.top = pileRect.top + 'px';
                clone.style.transform = `scale(${gameScale}) rotate(${Math.random() * 20 - 10}deg)`;
                clone.style.opacity = '0.8';
            }, 10);

            clone.addEventListener("transitionend", () => clone.remove(), { once: true });
            setTimeout(() => { if (document.body.contains(clone)) clone.remove(); }, 500); 
        }

        function playLogic(index, value, suit) {
            if (document.getElementById('my-hand-container').classList.contains('not-my-turn')) return;
            if (actionLocked || Date.now() - lastClickTime < CLICK_DELAY) return;
            
            actionLocked = true;
            lastClickTime = Date.now();

            const cardElement = document.querySelector(`.card-${index}`);
            
            if (value === 'A') {
                let isTopAce = window.currentTopCard && window.currentTopCard.value === 'A';
                let effectiveSuit = window.currentActiveSuit || (window.currentTopCard ? window.currentTopCard.suit : null);
                
                if (isTopAce && suit === effectiveSuit) {
                    if (cardElement) animateThrow(cardElement);
                    socket.emit('playCard', { index: index, declaredSuit: null });
                    return;
                }

                if (cardElement) animateThrow(cardElement);
                selectedAceIndex = index;
                document.getElementById('ace-modal').style.display = 'flex';
                return;
            }
            
            if (cardElement) animateThrow(cardElement);
            socket.emit('playCard', { index: index, declaredSuit: null });
        }

        function confirmAce(suit) {
            const cardElement = document.querySelector(`.card-${selectedAceIndex}`);
            if (cardElement) animateThrow(cardElement);
            document.getElementById('ace-modal').style.display = 'none';
            socket.emit('playCard', { index: selectedAceIndex, declaredSuit: suit });
        }
        
        function cancelAce() {
            document.getElementById('ace-modal').style.display = 'none';
            selectedAceIndex = null;
            actionLocked = false; 
        }

        socket.on('updateScoreboard', (data) => {
            fullScoreHistory = data.history;
            renderScoreboard();
        });

        function renderScoreboard() {
            const t = document.getElementById('score-table');
            if (!fullScoreHistory || fullScoreHistory.length === 0) {
                t.innerHTML = "";
                return;
            }
            const pIds = Object.keys(fullScoreHistory[0]);
            
            const pMap = {};
            if(window.currentScoreData && window.currentScoreData.players) {
                window.currentScoreData.players.forEach(p => { pMap[p.id] = { name: p.name, hats: p.hats }; });
            }

            let html = `<tr>${pIds.map(id => {
                let p = pMap[id] || {name: "Παίκτης", hats: 0};
                return `<th>${p.name} ${"🎩".repeat(p.hats)}</th>`;
            }).join('')}</tr>`;

            let dataToShow = isScoreboardExpanded ? fullScoreHistory : fullScoreHistory.slice(-5);
            dataToShow.forEach(r => { 
                html += '<tr>' + pIds.map(id => `<td>${r[id] === "WC" ? '<span style="color:#d4af37; font-weight:bold;">WC</span>' : r[id]}</td>`).join('') + '</tr>'; 
            });
            t.innerHTML = html;
        }

        function toggleScoreboard() {
            isScoreboardExpanded = !isScoreboardExpanded;
            renderScoreboard();
        }
        
        socket.on('notification', (msg) => {
            if (msg.includes('Ανακάτεμα')) playSound('shuffle');
            else if (msg.includes('+') || msg.includes('ΦΑΕ') || msg.includes('ποινή') || msg.includes('Auto-pass')) playSound('penalty');

            const o = document.getElementById('msg-overlay');
            o.innerText = msg; o.style.display = 'flex';
            setTimeout(() => o.style.display = 'none', 3000); 
        });

        socket.on('invalidMove', () => {
            actionLocked = false; 
            const o = document.getElementById('msg-overlay');
            o.innerText = "Ακυρη Κίνηση!"; 
            o.style.display = 'flex';
            o.style.color = "red";
            setTimeout(() => { o.style.display = 'none'; o.style.color = "#d4af37"; }, 1000);
            shakeCards();
        });

        function addCardToPile(c) {
            const container = document.getElementById('pile-container');
            if(!container) return;
            const div = document.createElement('div');
            const color = (c.suit === '♥' || c.suit === '♦') ? 'red' : '';
            
            div.className = `card-base pile-card played-card ${color}`; 
            const x = Math.random() * 6 - 3;
            const y = Math.random() * 6 - 3;
            const r = Math.random() * 20 - 10; 
            
            div.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
            div.innerHTML = `<div class="card-corner">${c.value}<div>${c.suit}</div></div><div class="card-center">${c.suit}</div><div class="card-corner bottom">${c.value}<div>${c.suit}</div></div>`;
            
            container.appendChild(div);
            
            const cards = container.querySelectorAll('.pile-card');
            if (cards.length > 6) {
                cards[0].remove();
            }
        }

        function shakeCards() { 
            document.querySelectorAll('.hand-card').forEach(c => c.classList.add('shake')); 
            setTimeout(() => document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('shake')), 200); 
        }
    </script>
</body>
</html>
